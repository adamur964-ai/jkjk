<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 pb-32">
    <div id="header-container"></div>
    <main class="max-w-md mx-auto px-6 pt-8 space-y-6">
        <section id="ticket-form-section" class="bg-white p-8 rounded-[2.5rem] border border-slate-200">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-[#002147] mb-6">Open New Ticket</h3>
            <form id="ticket-form" class="space-y-6">
                <div>
                    <label>Subject</label>
                    <input type="text" id="subject" class="w-full" placeholder="Issue with transfer..." required>
                </div>
                <div>
                    <label>Message</label>
                    <textarea id="message" class="w-full h-32 py-4" placeholder="Describe your issue in detail..." required></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full btn-primary h-16 shadow-xl shadow-navy-900/20">Send Message</button>
            </form>
        </section>

        <section>
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-[#002147] mb-6">Support History</h3>
            <div id="ticket-list" class="space-y-4"></div>
        </section>
    </main>
    <div id="nav-container"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { renderHeader, renderBottomNav, renderStatusBadge, renderEmptyState } from './components.js';
        import { showToast } from './toast.js';

        document.getElementById('header-container').innerHTML = renderHeader('Support', true);
        document.getElementById('nav-container').innerHTML = renderBottomNav('settings');

        document.getElementById('ticket-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            try {
                await addDoc(collection(db, "supportTickets"), {
                    uid: auth.currentUser.uid,
                    subject: document.getElementById('subject').value,
                    status: "OPEN",
                    createdAt: serverTimestamp(),
                    messages: [{
                        sender: "user",
                        text: document.getElementById('message').value,
                        timestamp: new Date().toISOString()
                    }]
                });
                showToast("Ticket created successfully.", "success");
                document.getElementById('ticket-form').reset();
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false;
            }
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                const q = query(collection(db, "supportTickets"), where("uid", "==", user.uid), orderBy("createdAt", "desc"));
                onSnapshot(q, snap => {
                    const cont = document.getElementById('ticket-list');
                    if (snap.empty) { cont.innerHTML = renderEmptyState("No active support tickets."); return; }
                    cont.innerHTML = snap.docs.map(doc => {
                        const t = doc.data();
                        return `
                            <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center">
                                <div>
                                    <p class="font-black text-[#002147] text-sm">${t.subject}</p>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">Ticket ID: ${doc.id.slice(0,8)}</p>
                                </div>
                                ${renderStatusBadge(t.status)}
                            </div>
                        `;
                    }).join('');
                });
            }
        });
    </script>
</body>
</html>
