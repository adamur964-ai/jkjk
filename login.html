<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Secure Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap');
        :root { 
            --sba-blue: #002e6d; 
            --sba-red: #cc0000;
            --google-blue: #4285f4;
            --google-red: #ea4335;
            --google-yellow: #fbbc05;
            --google-green: #34a853;
        }
        body { font-family: 'Public Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        .sba-logo-box { position: relative; display: inline-block; padding: 4px 6px; }
        .sba-logo-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 4px; border-top: 2.5px solid var(--sba-blue); border-left: 2.5px solid var(--sba-blue); border-right: 2.5px solid var(--sba-blue); }
        .sba-logo-box::after { content: ""; position: absolute; bottom: 0; left: 0; right: 30%; height: 2.5px; background: var(--sba-red); }

        .auth-card { background: white; border-top: 5px solid var(--sba-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 4px; }
        
        input { font-size: 16px !important; border-radius: 4px !important; transition: all 0.2s; height: 50px; }
        input:focus { border-color: var(--sba-blue) !important; ring: 0 !important; outline: none !important; background: #fff !important; }

        .btn-sba { background: var(--sba-blue); color: white; height: 55px; font-size: 13px; letter-spacing: 1.5px; font-weight: 900; text-transform: uppercase; border-radius: 4px; transition: 0.3s; cursor: pointer; }
        .btn-sba:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-sba:active { transform: scale(0.97); background: #001a3d; }

        .btn-google { 
            background: #ffffff; 
            border: 1.5px solid #dadce0; 
            color: #3c4043; 
            height: 55px; 
            font-size: 13px; 
            letter-spacing: 0.5px; 
            font-weight: 700; 
            border-radius: 4px; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
        }
        .btn-google:hover { 
            background: #f8f9fa; 
            box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 1px 2px rgba(60,64,67,0.15);
            border-color: #dadce0;
        }
        .eye-icon { cursor: pointer; transition: color 0.2s; }
        .eye-icon:hover { color: var(--sba-blue); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="bg-[#efefef] py-2 px-4 flex items-center gap-2 border-b border-gray-200">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" class="w-4 shadow-sm" alt="U.S. Flag">
        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Secure Log-in & Authentication System</span>
    </div>

    <nav class="bg-white px-5 py-3 flex justify-between items-center border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="sba-logo-box">
                <span class="text-xl font-black text-[#002e6d] tracking-tighter uppercase">SBA</span>
            </div>
        </div>
        <a href="register.html" class="text-[11px] font-black text-[#002e6d] hover:text-red-600 uppercase transition-all">Initialize Case</a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-5">
        <div class="w-full max-w-[420px]">
            <div class="auth-card p-6 md:p-10">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Sign In</h2>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Access Portal and Case Ledger</p>
                </div>

                <div id="alertBox" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-600 text-red-700 text-[11px] font-black uppercase italic shadow-sm"></div>

                <div class="space-y-4">
                    <button type="button" id="googleBtn" class="btn-google w-full">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.21-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.05-3.71 1.05-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        <span>Sign in with Google</span>
                    </button>

                    <div class="relative flex py-1 items-center">
                        <div class="flex-grow border-t border-slate-200"></div>
                        <span class="flex-shrink mx-3 text-[9px] font-bold tracking-widest text-slate-400 uppercase">OR USE EMAIL</span>
                        <div class="flex-grow border-t border-slate-200"></div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Government Email</label>
                        <input type="email" id="userEmail" class="w-full px-4 bg-slate-50 border border-slate-200 outline-none" placeholder="example@mail.com">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Passkey</label>
                        <div class="relative flex items-center">
                            <input type="password" id="userPass" class="w-full px-4 bg-slate-50 border border-slate-200 outline-none pr-12" placeholder="••••••">
                            <span class="absolute right-4 text-slate-400 eye-icon" onclick="togglePasswordVisibility()">
                                <i id="eyeIcon" class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="accent-[#002e6d]"> Keep Connected
                        </label>
                        <a href="forget-password.html" class="text-blue-700 hover:underline">Forgot Access?</a>
                    </div>

                    <button type="button" id="submitBtn" class="btn-sba w-full shadow-lg mt-4">
                        Access Secure Dashboard
                    </button>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Need a case file?</p>
                    <a href="register.html" class="text-[#002e6d] font-black text-[12px] uppercase tracking-[0.2em] hover:text-red-600 transition-all">Create An Account <i class="fas fa-chevron-right ml-1"></i></a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em]">
        <i class="fas fa-lock mr-2"></i> Encrypted Federal Node-V15
    </footer>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const alertBox = document.getElementById('alertBox');
        const btn = document.getElementById('submitBtn');
        const googleBtn = document.getElementById('googleBtn');
        const ADMIN_EMAIL = "liger4683@gmail.com";

        window.togglePasswordVisibility = function() {
            const passInput = document.getElementById('userPass');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.className = "fas fa-eye-slash";
            } else {
                passInput.type = "password";
                eyeIcon.className = "fas fa-eye";
            }
        };

        btn.onclick = async () => {
            alertBox.classList.add('hidden');
            
            const email = document.getElementById('userEmail').value.toLowerCase().trim();
            const pass = document.getElementById('userPass').value;

            if (!email || !pass) {
                alertBox.innerText = "SYSTEM: Please enter email and passkey.";
                alertBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> VERIFYING...';

            try {
                await signInWithEmailAndPassword(auth, email, pass);

                if (email === ADMIN_EMAIL) {
                    window.location.replace("admin-portal.html");
                } else {
                    // Go straight to welcome — no email verification step
                    window.location.replace("welcome.html");
                }
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Access Secure Dashboard";
                alertBox.innerText = "AUTH ERROR: Check your access details and try again.";
                alertBox.classList.remove('hidden');
            }
        };

        // Allow Enter key to submit
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') btn.click();
        });

        googleBtn.onclick = async () => {
            alertBox.classList.add('hidden');
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> CONNECTING...';

            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                if (user.email === ADMIN_EMAIL) {
                    window.location.replace("admin-portal.html");
                    return;
                }

                // Go straight to welcome — no email verification step
                window.location.replace("welcome.html");
            } catch (error) {
                googleBtn.disabled = false;
                googleBtn.innerHTML = `
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.21-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.05-3.71 1.05-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>Sign in with Google</span>
                `;
                alertBox.innerText = "AUTH ERROR: " + error.message;
                alertBox.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
