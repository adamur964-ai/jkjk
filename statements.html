<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Statements | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 pb-32">
    <div id="header-container"></div>
    <main class="max-w-md mx-auto px-6 pt-8">
        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 text-center space-y-6">
            <i class="fa-solid fa-file-invoice-dollar text-4xl text-[#D4AF37]"></i>
            <h2 class="text-xl font-black text-[#002147]">Generate Statement</h2>
            <div class="text-left space-y-4">
                <div>
                    <label>Start Date</label>
                    <input type="date" class="w-full">
                </div>
                <div>
                    <label>End Date</label>
                    <input type="date" class="w-full">
                </div>
            </div>
            <button class="w-full btn-primary h-14" onclick="window.print()">Download PDF Statement</button>
        </div>
    </main>
    <div id="nav-container"></div>

    <script type="module">
        import { renderHeader, renderBottomNav } from './components.js';
        document.getElementById('header-container').innerHTML = renderHeader('E-Statements', true);
        document.getElementById('nav-container').innerHTML = renderBottomNav('settings');
    </script>
</body>
</html>
