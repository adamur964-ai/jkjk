<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Digital Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <button onclick="history.back()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-400 border border-slate-100"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-sm font-black uppercase text-[#002147]">Digital Vault</h1>
            <div class="w-10"></div>
        </header>

        <div class="bg-[#002147] p-8 rounded-[40px] text-center text-white mb-10 shadow-2xl">
            <i class="fas fa-shield-alt text-4xl text-[#D4AF37] mb-4"></i>
            <h2 class="text-xl font-black uppercase tracking-tighter">Secure Storage</h2>
            <p class="text-[10px] font-bold opacity-60 uppercase mt-2">End-to-End Encrypted Node</p>
        </div>

        <div class="space-y-3" id="vaultList">
            <!-- Items Injected -->
            <div class="bg-white p-5 rounded-2xl border border-slate-100 flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-[#002147]"><i class="fas fa-id-card"></i></div>
                <div class="flex-1">
                    <p class="text-[11px] font-black text-slate-800 uppercase">Identity_Front.jpg</p>
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Encrypted • 1.2MB</p>
                </div>
                <i class="fas fa-eye text-slate-300"></i>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-[#002147]"><i class="fas fa-file-pdf"></i></div>
                <div class="flex-1">
                    <p class="text-[11px] font-black text-slate-800 uppercase">Tax_Clearance_2026.pdf</p>
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Authorized Only</p>
                </div>
                <i class="fas fa-lock text-[#D4AF37]"></i>
            </div>
        </div>

        <button onclick="showToast('Cloud Sync Active')" class="w-full h-14 bg-slate-50 border border-slate-200 text-slate-400 rounded-2xl font-black uppercase tracking-widest text-[10px] mt-10">Refresh Vault Sync</button>
    </div>

    <script type="module">
        import { showToast } from './toast.js';
        window.showToast = showToast;
    </script>
</body>
</html>
