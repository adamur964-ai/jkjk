<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Support Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <header class="p-4 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-50">
        <button onclick="history.back()" class="text-slate-400"><i class="fas fa-chevron-left"></i></button>
        <div class="text-center">
            <h1 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Secure Line</h1>
            <p class="text-xs font-black text-[#002147] uppercase">Officer Sarah Miller</p>
        </div>
        <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
    </header>

    <main id="chatBody" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
        <!-- Messages Injected -->
    </main>

    <footer class="p-4 bg-white border-t border-slate-100 pb-10">
        <div class="flex gap-2">
            <input type="text" id="msgIn" class="flex-1 h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 text-sm font-bold outline-none focus:border-[#002147]" placeholder="Type your query...">
            <button id="sendBtn" class="w-12 h-12 bg-[#002147] text-white rounded-xl shadow-lg shadow-blue-900/20"><i class="fas fa-paper-plane"></i></button>
        </div>
    </footer>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { doc, onSnapshot, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        onAuthStateChanged(auth, user => {
            if(!user) return;
            onSnapshot(doc(db, "users", user.uid), snap => {
                const history = snap.data().chatHistory || [];
                const body = document.getElementById('chatBody');
                body.innerHTML = `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 text-[11px] font-bold text-slate-600 max-w-[85%]">
                    <b>System:</b> Hello ${snap.data().fullName}. Officer Miller is available to assist you with transaction audits, credit limit increases, and node security.
                </div>`;
                body.innerHTML += history.map(m => `
                    <div class="p-4 rounded-2xl text-[11px] font-bold max-w-[85%] ${m.sender === 'USER' ? 'bg-[#002147] text-white self-end ml-auto' : 'bg-white border border-slate-100 text-slate-800 self-start'}">
                        ${m.text}
                    </div>`).join('');
                body.scrollTo(0, body.scrollHeight);
            });
        });

        document.getElementById('sendBtn').onclick = async () => {
            const t = document.getElementById('msgIn').value;
            if(!t) return;
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                chatHistory: arrayUnion({ sender: 'USER', text: t, time: new Date().toISOString() })
            });
            document.getElementById('msgIn').value = "";
        };
    </script>
</body>
</html>
