<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB | Executive Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 pb-32">
    <header class="gradient-navy pt-12 pb-24 px-6 rounded-b-[40px] shadow-2xl relative overflow-hidden">
        <div class="flex justify-between items-center relative z-10 animate-in">
            <div class="flex items-center gap-4">
                <div id="avatar" class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white font-black border border-white/20">..</div>
                <div>
                    <h1 id="userName" class="text-white font-black uppercase text-sm tracking-tight">Loading...</h1>
                    <p id="accNum" class="text-slate-400 text-[9px] font-black uppercase tracking-widest mt-1">ACC: ****</p>
                </div>
            </div>
            <a href="notifications.html" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white/50 border border-white/10">
                <i class="fas fa-bell"></i>
            </a>
        </div>
    </header>

    <main class="px-6 -mt-16 relative z-20 space-y-6">
        <!-- Balance Module -->
        <div class="glass-card p-8 tb-shadow animate-in">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Liquid Liquidity</span>
                <span id="currencyTag" class="text-[9px] font-black bg-slate-100 px-3 py-1 rounded-full text-slate-600">USD</span>
            </div>
            <div class="flex items-center gap-4">
                <h2 id="balAvailable" class="text-4xl font-black text-[#002147] tracking-tighter">$0.00</h2>
                <i class="fas fa-eye-slash text-slate-200 cursor-pointer"></i>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mt-8 pt-8 border-t border-slate-50">
                <div>
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Vault Reserve</p>
                    <p id="balSavings" class="text-sm font-black text-emerald-600">$0.00</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Assets</p>
                    <p id="balTotal" class="text-sm font-black text-[#002147]">$0.00</p>
                </div>
            </div>

            <!-- Action Grid -->
            <div class="grid grid-cols-4 gap-2 mt-8">
                <a href="deposit.html" class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-[#002147] border border-slate-100 hover:bg-[#D4AF37] hover:text-white transition-all"><i class="fas fa-plus"></i></div>
                    <span class="text-[8px] font-black uppercase">Deposit</span>
                </a>
                <a href="transfer.html" class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-[#002147] border border-slate-100 hover:bg-[#D4AF37] hover:text-white transition-all"><i class="fas fa-exchange-alt"></i></div>
                    <span class="text-[8px] font-black uppercase">Transfer</span>
                </a>
                <a href="withdraw.html" class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-[#002147] border border-slate-100 hover:bg-[#D4AF37] hover:text-white transition-all"><i class="fas fa-paper-plane"></i></div>
                    <span class="text-[8px] font-black uppercase">Payout</span>
                </a>
                <a href="loans.html" class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-[#002147] border border-slate-100 hover:bg-[#D4AF37] hover:text-white transition-all"><i class="fas fa-hand-holding-dollar"></i></div>
                    <span class="text-[8px] font-black uppercase">Loans</span>
                </a>
            </div>
        </div>

        <div class="animate-in" style="animation-delay: 0.1s;">
            <div class="flex justify-between items-center px-2 mb-4">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Recent Activity</h3>
                <a href="transactions.html" class="text-[10px] font-black text-[#D4AF37] uppercase underline">View Full Ledger</a>
            </div>
            <div id="recent-list" class="space-y-3">
                <!-- Transactions Injected -->
            </div>
        </div>
    </main>

    <div id="bottom-nav"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, onSnapshot, collection, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { renderNav } from './components.js';
        import { formatMoney } from './utils.js';

        onAuthStateChanged(auth, user => {
            if(!user) { window.location.href="login.html"; return; }
            renderNav('home');

            // 1. Sync User Profile
            onSnapshot(doc(db, "users", user.uid), snap => {
                const u = snap.data();
                document.getElementById('userName').innerText = u.name;
                document.getElementById('avatar').innerText = u.name.charAt(0);
            });

            // 2. Sync Account Balances
            onSnapshot(doc(db, "accounts", user.uid), snap => {
                const a = snap.data();
                document.getElementById('accNum').innerText = "ACC: ****" + a.accNumber.slice(-4);
                document.getElementById('currencyTag').innerText = a.currency;
                document.getElementById('balAvailable').innerText = formatMoney(a.balAvailable, a.currency);
                document.getElementById('balSavings').innerText = formatMoney(a.balSavings, a.currency);
                document.getElementById('balTotal').innerText = formatMoney(a.balTotal, a.currency);
            });

            // 3. Load Recent Ledger
            const q = query(collection(db, "transactions"), where("uid", "==", user.uid), orderBy("timestamp", "desc"), limit(3));
            onSnapshot(q, snap => {
                const list = document.getElementById('recent-list');
                list.innerHTML = snap.empty ? `<p class="text-center py-6 text-[10px] font-black text-slate-300 uppercase">No Activity Logged</p>` : "";
                snap.forEach(d => {
                    const tx = d.data();
                    const isCredit = ['DEPOSIT', 'LOAN'].includes(tx.type);
                    list.innerHTML += `
                        <div class="glass-card p-5 flex justify-between items-center border-l-4 ${isCredit ? 'border-emerald-500' : 'border-[#002147]'}">
                            <div>
                                <p class="text-[11px] font-black uppercase text-slate-800">${tx.description}</p>
                                <p class="text-[8px] font-black text-slate-400 mt-1 uppercase">${new Date(tx.timestamp).toLocaleDateString()}</p>
                            </div>
                            <p class="text-xs font-black ${isCredit ? 'text-emerald-600' : 'text-slate-800'}">
                                ${isCredit ? '+' : '-'}${formatMoney(tx.amount, tx.currency || 'USD')}
                            </p>
                        </div>
                    `;
                });
            });
        });
    </script>
</body>
</html>
