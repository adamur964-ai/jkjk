<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Withdraw Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <button onclick="history.back()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-400 border border-slate-100"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-sm font-black uppercase text-[#002147]">Withdrawal Terminal</h1>
            <div class="w-10"></div>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
            <div class="bg-amber-50 p-4 rounded-2xl border-l-4 border-amber-500 mb-6">
                <p class="text-[9px] font-black text-amber-700 uppercase">Operational Status: SECURE</p>
                <p class="text-[11px] font-bold text-amber-900 mt-1">International withdrawals require a verified transaction PIN.</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Transfer Protocol</label>
                    <select id="method" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl px-4 font-bold text-xs">
                        <option value="ACH">Domestic ACH (1-2 Days)</option>
                        <option value="WIRE">FedWire / SWIFT (Instant-Same Day)</option>
                        <option value="CRYPTO">Blockchain Payout (USDT/SOL)</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Amount</label>
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 font-black text-slate-300">$</span>
                        <input type="number" id="amt" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl pl-10 pr-4 font-black text-lg outline-none focus:border-[#002147]" placeholder="0.00">
                    </div>
                    <p id="avail" class="text-[9px] font-bold text-slate-400 mt-2 px-1 uppercase">Available: $0.00</p>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Destination Credentials</label>
                    <textarea id="details" class="w-full h-24 bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold outline-none focus:border-[#002147]" placeholder="Enter Bank Routing/Account or Wallet Address..."></textarea>
                </div>

                <div class="pt-4 border-t border-slate-50">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Secure PIN</label>
                    <input type="password" id="pin" maxlength="4" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl px-4 text-center text-2xl tracking-[20px] outline-none focus:border-[#002147]" placeholder="••••">
                </div>

                <button id="subBtn" class="w-full h-14 bg-[#002147] text-white rounded-2xl font-black uppercase tracking-widest shadow-lg">Authorize Withdrawal</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { showToast } from './toast.js';

        let userData = null;

        onAuthStateChanged(auth, async user => {
            if(!user) return;
            const snap = await getDoc(doc(db, "users", user.uid));
            userData = snap.data();
            document.getElementById('avail').innerText = `Available: $${userData.balAvailable.toLocaleString()}`;
        });

        document.getElementById('subBtn').onclick = async () => {
            const amt = Number(document.getElementById('amt').value);
            const pin = document.getElementById('pin').value;
            const det = document.getElementById('details').value;

            if(!amt || !pin || !det) { showToast("All fields required", "error"); return; }
            if(amt > userData.balAvailable) { showToast("Insufficient funds", "error"); return; }
            if(pin !== userData.transactionPin) { showToast("Incorrect PIN", "error"); return; }

            document.getElementById('subBtn').disabled = true;
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    balAvailable: userData.balAvailable - amt,
                    withdrawStatus: 'PENDING',
                    withdrawAmount: amt,
                    withdrawDetails: det
                });
                showToast("Withdrawal Requested");
                setTimeout(() => window.location.href="dashboard.html", 1500);
            } catch (e) { showToast("System Error", "error"); }
        };
    </script>
</body>
</html>
