<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Security Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen pb-32">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-lg font-black uppercase text-[#002147]">Security Center</h1>
            <button onclick="logout()" class="text-[10px] font-black text-rose-500 uppercase">Terminate Session</button>
        </header>

        <!-- Profile Brief -->
        <div class="bg-[#002147] p-6 rounded-3xl text-white shadow-xl mb-8">
            <p id="setName" class="text-xl font-black">...</p>
            <p id="setEmail" class="text-[10px] font-bold opacity-60 mt-1">...</p>
            <div class="mt-4 pt-4 border-t border-white/10 flex gap-2">
                <span id="setKyc" class="text-[8px] font-black uppercase px-2 py-1 rounded bg-white/10">...</span>
                <span class="text-[8px] font-black uppercase px-2 py-1 rounded bg-white/10">Node Access: Active</span>
            </div>
        </div>

        <div class="space-y-4">
            <!-- PIN Management -->
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <label class="text-[10px] font-bold text-slate-400 uppercase">Transaction PIN (4 Digits)</label>
                <input type="password" id="newPin" maxlength="4" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-xl px-4 mt-2 text-center text-2xl tracking-[20px]" placeholder="••••">
                <button id="upPin" class="w-full h-12 bg-slate-900 text-white rounded-xl mt-4 font-bold text-xs uppercase">Sync Secure PIN</button>
            </div>

            <!-- KYC Shortcut -->
            <a href="kyc.html" class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div>
                    <p class="text-[11px] font-black text-slate-800 uppercase">Identity Verification</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Manage Government Credentials</p>
                </div>
                <i class="fas fa-chevron-right text-slate-300"></i>
            </a>

            <!-- Vault Shortcut -->
            <a href="vault.html" class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div>
                    <p class="text-[11px] font-black text-slate-800 uppercase">Digital Vault</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Stored Statements & Docs</p>
                </div>
                <i class="fas fa-shield-alt text-slate-300"></i>
            </a>
        </div>
    </div>

    <div id="main-nav"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { injectNavbar } from './components.js';
        import { showToast } from './toast.js';

        onAuthStateChanged(auth, user => {
            if(!user) return;
            injectNavbar('settings');
            onSnapshot(doc(db, "users", user.uid), snap => {
                const d = snap.data();
                document.getElementById('setName').innerText = d.fullName;
                document.getElementById('setEmail').innerText = d.email;
                document.getElementById('setKyc').innerText = "KYC: " + d.kycStatus;
            });
        });

        document.getElementById('upPin').onclick = async () => {
            const pin = document.getElementById('newPin').value;
            if(pin.length !== 4) return;
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { transactionPin: pin });
                showToast("Transaction PIN Updated");
                document.getElementById('newPin').value = "";
            } catch (e) { showToast("Update Failed", "error"); }
        };

        window.logout = () => signOut(auth).then(() => window.location.href="login.html");
    </script>
</body>
</html>
