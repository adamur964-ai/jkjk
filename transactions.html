<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 pb-32">
    <div id="header-container"></div>
    <main class="max-w-md mx-auto px-6 pt-8">
        <div id="transaction-list" class="space-y-4"></div>
    </main>
    <div id="nav-container"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { renderHeader, renderBottomNav, renderEmptyState } from './components.js';
        import { formatCurrency, formatDate } from './utils.js';

        document.getElementById('header-container').innerHTML = renderHeader('Transactions', true);
        document.getElementById('nav-container').innerHTML = renderBottomNav('transactions');

        auth.onAuthStateChanged(user => {
            if (user) {
                const q = query(collection(db, "transactions"), where("uid", "==", user.uid), orderBy("timestamp", "desc"));
                onSnapshot(q, snap => {
                    const cont = document.getElementById('transaction-list');
                    if (snap.empty) { cont.innerHTML = renderEmptyState("No transactions yet."); return; }
                    cont.innerHTML = snap.docs.map(doc => {
                        const t = doc.data();
                        return `
                            <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center">
                                <div>
                                    <p class="text-xs font-black uppercase text-slate-400 mb-1">${t.type}</p>
                                    <p class="font-bold text-[#002147]">${t.description}</p>
                                    <p class="text-[10px] text-slate-400 mt-1">${formatDate(t.timestamp)}</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-black text-sm">${formatCurrency(t.amount, t.currency)}</p>
                                    <p class="text-[8px] font-black uppercase text-emerald-500 tracking-tighter">Completed</p>
                                </div>
                            </div>
                        `;
                    }).join('');
                });
            }
        });
    </script>
</body>
</html>
