<!-- admin-portal.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Console | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .admin-card { background: #1e293b; border: 1px solid #334155; }
        .tab-btn.active { border-bottom: 2px solid #D4AF37; color: #D4AF37; }
        .admin-input { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 0.75rem; padding: 0.75rem; }
        ::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="border-b border-slate-800 bg-slate-900 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#D4AF37] rounded-xl flex items-center justify-center text-[#002147] font-black shadow-lg">TB</div>
            <div>
                <h1 class="text-sm font-black uppercase tracking-widest text-white">Trust Bank</h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Executive Management Portal</p>
            </div>
        </div>
        <button id="logout-btn" class="text-rose-500 font-black text-xs uppercase tracking-widest hover:text-rose-400">Sign Out</button>
    </nav>

    <div class="bg-slate-900 border-b border-slate-800 px-8 flex gap-8 overflow-x-auto no-scrollbar">
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors active" data-tab="users">Users</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="deposits">Deposits</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="withdrawals">Withdrawals</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="kyc">KYC</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="loans">Loans</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="cards">Cards</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="notifications">Alerts</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="audit">Audit Log</button>
    </div>

    <main class="p-8 max-w-7xl mx-auto">
        <div id="tab-content" class="space-y-6"></div>
    </main>

    <!-- Global Rejection Modal -->
    <div id="rejection-modal" class="fixed inset-0 bg-slate-950/80 hidden z-[100] flex items-center justify-center p-6">
        <div class="admin-card w-full max-w-md p-8 rounded-3xl">
            <h3 class="text-xl font-black text-white mb-2">Decline Request</h3>
            <textarea id="rejection-reason" class="w-full admin-input h-32 mb-6" placeholder="Reason for declining..."></textarea>
            <div class="flex gap-4">
                <button onclick="document.getElementById('rejection-modal').classList.add('hidden')" class="flex-1 text-slate-400 text-xs font-black uppercase">Cancel</button>
                <button id="confirm-rejection" class="flex-1 bg-rose-600 text-white rounded-2xl py-4 font-black uppercase text-xs">Confirm Decline</button>
            </div>
        </div>
    </div>

    <!-- Image Viewer -->
    <div id="image-modal" class="fixed inset-0 bg-black/95 hidden z-[110] flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="modal-img-tag" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAIL } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot, doc, updateDoc, increment, addDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { formatCurrency, formatDate } from './utils.js';
        import { showToast } from './toast.js';

        let currentTab = 'users';
        let pendingAction = null;

        auth.onAuthStateChanged(user => {
            if (!user || user.email !== ADMIN_EMAIL) window.location.href = "login.html";
            renderTab();
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                renderTab();
            };
        });

        const logAudit = async (action, target, reason = "") => {
            await addDoc(collection(db, "auditLogs"), {
                actor: auth.currentUser.email, action, target, reason, timestamp: serverTimestamp()
            });
        };

        const notify = async (uid, message, type="ALERT") => {
            await addDoc(collection(db, "notifications"), {
                uid, message, type, read: false, timestamp: serverTimestamp()
            });
        };

        window.viewImage = (src) => {
            document.getElementById('modal-img-tag').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
        };

        // --- ACTIONS ---
        window.approveTransaction = async (coll, id, uid, amount) => {
            try {
                await updateDoc(doc(db, coll, id), { status: "SUCCESSFUL" });
                const accQ = query(collection(db, "accounts"), where("ownerUid", "==", uid));
                const accSnap = await getDocs(accQ);
                const accId = accSnap.docs[0].id;
                const change = coll === 'deposits' ? amount : -amount;

                await updateDoc(doc(db, "accounts", accId), { 
                    availableBalance: increment(change),
                    totalBalance: increment(change) 
                });

                await addDoc(collection(db, "transactions"), {
                    uid, amount, type: coll.toUpperCase().slice(0,-1),
                    status: "SUCCESSFUL", timestamp: serverTimestamp(),
                    description: `Admin Approved ${coll.slice(0,-1)}`
                });

                await logAudit(`APPROVE_${coll.toUpperCase()}`, uid);
                await notify(uid, `Your ${coll.slice(0,-1)} request has been approved.`);
                showToast("Request Approved");
            } catch (err) { showToast(err.message, "error"); }
        };

        window.openDecline = (coll, id, uid) => {
            pendingAction = { coll, id, uid };
            document.getElementById('rejection-modal').classList.remove('hidden');
        };

        document.getElementById('confirm-rejection').onclick = async () => {
            const reason = document.getElementById('rejection-reason').value;
            if (!reason) return showToast("Reason required", "error");
            try {
                await updateDoc(doc(db, pendingAction.coll, pendingAction.id), { status: "DECLINED", declineReason: reason });
                await logAudit(`DECLINE_${pendingAction.coll.toUpperCase()}`, pendingAction.uid, reason);
                await notify(pendingAction.uid, `Request declined: ${reason}`);
                document.getElementById('rejection-modal').classList.add('hidden');
                showToast("Request Declined");
            } catch (err) { showToast(err.message, "error"); }
        };

        // --- TAB RENDERER ---
        const renderTab = () => {
            const content = document.getElementById('tab-content');
            content.innerHTML = `<div class="py-20 text-center animate-pulse text-slate-500 font-black uppercase text-xs tracking-widest">Accessing Secure Node...</div>`;

            const handleError = (err) => {
                showToast(`Access Denied: ${err.message}`, "error");
                content.innerHTML = `<div class="bg-rose-500/10 border border-rose-500/20 p-8 rounded-3xl text-rose-500 text-center">
                    <i class="fa-solid fa-lock text-3xl mb-4"></i>
                    <p class="font-black uppercase text-xs tracking-widest">Permission Denied</p>
                    <p class="text-[10px] font-bold opacity-70 mt-2">${err.message}</p>
                </div>`;
            };

            if (currentTab === 'users') {
                onSnapshot(collection(db, "users"), (snap) => {
                    content.innerHTML = snap.docs.map(d => {
                        const u = d.data();
                        return `
                            <div class="admin-card p-6 rounded-3xl flex justify-between items-center">
                                <div class="flex items-center gap-4">
                                    <img src="${u.profilePhoto || 'https://ui-avatars.com/api/?name='+u.fullName}" class="w-12 h-12 rounded-full border border-slate-700">
                                    <div><p class="font-black text-white">${u.fullName}</p><p class="text-[10px] text-slate-500">${u.email}</p></div>
                                </div>
                                <span class="px-3 py-1 rounded-lg bg-slate-800 text-[9px] font-black uppercase">${u.status}</span>
                            </div>
                        `;
                    }).join(''), handleError);
            }

            else if (['deposits', 'withdrawals', 'loans', 'cards'].includes(currentTab)) {
                onSnapshot(query(collection(db, currentTab), orderBy("createdAt", "desc")), (snap) => {
                    content.innerHTML = snap.docs.map(dDoc => {
                        const d = dDoc.data();
                        const isPending = d.status === 'PENDING';
                        return `
                            <div class="admin-card p-6 rounded-3xl flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] font-black text-[#D4AF37] uppercase mb-1">${currentTab.slice(0,-1)}</p>
                                    <p class="text-xl font-black text-white">${d.amount ? formatCurrency(d.amount) : d.cardType}</p>
                                    <p class="text-[9px] text-slate-500 mt-1">${formatDate(d.createdAt)}</p>
                                </div>
                                <div class="flex items-center gap-4">
                                    ${d.proofImage ? `<button onclick="viewImage('${d.proofImage}')" class="text-[9px] font-black text-blue-400 uppercase">View Proof</button>` : ''}
                                    ${isPending ? `
                                        <button onclick="approveTransaction('${currentTab}', '${dDoc.id}', '${d.uid}', ${d.amount || 0})" class="px-4 py-2 bg-emerald-600 rounded-xl text-[9px] font-black uppercase">Approve</button>
                                        <button onclick="openDecline('${currentTab}', '${dDoc.id}', '${d.uid}')" class="px-4 py-2 bg-rose-600 rounded-xl text-[9px] font-black uppercase">Decline</button>
                                    ` : `<span class="text-[9px] font-black uppercase text-slate-500">${d.status}</span>`}
                                </div>
                            </div>
                        `;
                    }).join(''), handleError);
            }

            else if (currentTab === 'notifications') {
                content.innerHTML = `
                    <div class="admin-card p-8 rounded-3xl">
                        <h3 class="text-xs font-black uppercase tracking-widest text-[#D4AF37] mb-6">Broadcast System Alert</h3>
                        <div class="space-y-4">
                            <input id="notif-uid" class="w-full admin-input" placeholder="Recipient UID (or 'all' for broadcast)">
                            <textarea id="notif-msg" class="w-full admin-input h-32" placeholder="System message..."></textarea>
                            <button id="send-notif" class="w-full bg-[#D4AF37] text-[#002147] font-black py-4 rounded-2xl uppercase text-xs">Push Notification</button>
                        </div>
                    </div>`;
                document.getElementById('send-notif').onclick = async () => {
                    const uid = document.getElementById('notif-uid').value;
                    const msg = document.getElementById('notif-msg').value;
                    if(!uid || !msg) return showToast("Fields required", "error");
                    await addDoc(collection(db, "notifications"), { uid, message: msg, type: "ALERT", read: false, timestamp: serverTimestamp() });
                    showToast("Notification broadcasted");
                };
            }

            else if (currentTab === 'audit') {
                onSnapshot(query(collection(db, "auditLogs"), orderBy("timestamp", "desc")), (snap) => {
                    content.innerHTML = `<div class="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden"><table class="w-full text-left text-[10px]">
                        <thead class="bg-slate-800 text-slate-400 uppercase font-black"><tr><th class="p-4">Action</th><th class="p-4">Target</th><th class="p-4">Reason</th><th class="p-4 text-right">Time</th></tr></thead>
                        <tbody>${snap.docs.map(doc => {
                            const l = doc.data();
                            return `<tr class="border-t border-slate-800"><td class="p-4 font-bold text-white">${l.action}</td><td class="p-4 text-slate-400">${l.target}</td><td class="p-4 text-slate-500">${l.reason}</td><td class="p-4 text-right text-slate-600">${formatDate(l.timestamp)}</td></tr>`;
                        }).join('')}</tbody></table></div>`;
                }, handleError);
            }
        };

        document.getElementById('logout-btn').onclick = () => auth.signOut();
    </script>
</body>
</html>
