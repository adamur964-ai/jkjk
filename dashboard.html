<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 pb-32">
    <div id="header-container"></div>

    <main class="max-w-md mx-auto px-6 pt-8 space-y-8">
        <!-- Balance Card -->
        <div class="bg-[#002147] rounded-[2.5rem] p-8 text-white relative overflow-hidden shadow-2xl shadow-navy-900/40">
            <div class="absolute top-0 right-0 w-32 h-32 bg-[#D4AF37] opacity-10 rounded-full -mr-16 -mt-16"></div>
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-[#D4AF37]/80 mb-1">Available Balance</p>
                        <h2 id="balance-main" class="text-4xl font-black tracking-tight">$0.00</h2>
                    </div>
                    <div id="currency-badge" class="px-3 py-1 bg-white/10 rounded-lg text-[10px] font-black">USD</div>
                </div>
                <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                    <div>
                        <p class="text-[9px] font-black uppercase tracking-wider text-slate-400 mb-1">Total Assets</p>
                        <p id="balance-total" class="text-lg font-bold">$0.00</p>
                    </div>
                    <div>
                        <p class="text-[9px] font-black uppercase tracking-wider text-slate-400 mb-1">Savings</p>
                        <p id="balance-savings" class="text-lg font-bold">$0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-4 gap-4">
            <a href="deposit.html" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-[#002147] shadow-sm border border-slate-100 hover:scale-105 transition-transform">
                    <i class="fa-solid fa-arrow-down-to-bracket text-xl"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500">Deposit</span>
            </a>
            <a href="withdraw.html" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-[#002147] shadow-sm border border-slate-100 hover:scale-105 transition-transform">
                    <i class="fa-solid fa-money-bill-transfer text-xl"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500">Withdraw</span>
            </a>
            <a href="transfer.html" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-[#002147] shadow-sm border border-slate-100 hover:scale-105 transition-transform">
                    <i class="fa-solid fa-paper-plane text-xl"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500">Transfer</span>
            </a>
            <a href="kyc.html" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-[#002147] shadow-sm border border-slate-100 hover:scale-105 transition-transform">
                    <i class="fa-solid fa-user-shield text-xl"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500">KYC</span>
            </a>
        </div>

        <!-- Recent Transactions -->
        <section>
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-[#002147]">Recent Activity</h3>
                <a href="transactions.html" class="text-[10px] font-black uppercase tracking-widest text-[#D4AF37]">View All</a>
            </div>
            <div id="recent-transactions" class="space-y-4">
                <!-- Skeleton Loading -->
                <div class="animate-pulse flex items-center justify-between p-4 bg-white rounded-3xl border border-slate-100">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-2xl"></div>
                        <div class="space-y-2">
                            <div class="h-3 w-24 bg-slate-100 rounded"></div>
                            <div class="h-2 w-16 bg-slate-50 rounded"></div>
                        </div>
                    </div>
                    <div class="h-4 w-12 bg-slate-100 rounded"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="nav-container"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { renderHeader, renderBottomNav, renderEmptyState } from './components.js';
        import { formatCurrency, formatDate } from './utils.js';

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "login.html"; return; }

            document.getElementById('header-container').innerHTML = renderHeader(`Welcome, ${user.displayName?.split(' ')[0] || 'User'}`);
            document.getElementById('nav-container').innerHTML = renderBottomNav('dashboard');

            // Listen to Account
            const qAccount = query(collection(db, "accounts"), where("ownerUid", "==", user.uid));
            onSnapshot(qAccount, (snapshot) => {
                if (!snapshot.empty) {
                    const acc = snapshot.docs[0].data();
                    document.getElementById('balance-main').innerText = formatCurrency(acc.availableBalance, acc.currency);
                    document.getElementById('balance-total').innerText = formatCurrency(acc.totalBalance, acc.currency);
                    document.getElementById('balance-savings').innerText = formatCurrency(acc.savingsBalance, acc.currency);
                    document.getElementById('currency-badge').innerText = acc.currency;
                }
            });

            // Listen to Transactions
            const qTrans = query(collection(db, "transactions"), where("uid", "==", user.uid), orderBy("timestamp", "desc"), limit(5));
            onSnapshot(qTrans, (snapshot) => {
                const container = document.getElementById('recent-transactions');
                if (snapshot.empty) {
                    container.innerHTML = renderEmptyState("No transactions yet.");
                    return;
                }
                container.innerHTML = snapshot.docs.map(doc => {
                    const t = doc.data();
                    const isCredit = t.type === 'DEPOSIT' || (t.type === 'TRANSFER' && t.toAccount === t.accountNumber);
                    return `
                        <div class="flex items-center justify-between p-4 bg-white rounded-3xl border border-slate-100 shadow-sm">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 ${isCredit ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'} rounded-2xl flex items-center justify-center">
                                    <i class="fa-solid ${isCredit ? 'fa-arrow-down-left' : 'fa-arrow-up-right'}"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-[#002147]">${t.description || t.type}</p>
                                    <p class="text-[10px] font-bold text-slate-400">${formatDate(t.timestamp)}</p>
                                </div>
                            </div>
                            <p class="text-sm font-black ${isCredit ? 'text-emerald-600' : 'text-rose-600'}">
                                ${isCredit ? '+' : '-'}${formatCurrency(t.amount, t.currency)}
                            </p>
                        </div>
                    `;
                }).join('');
            });
        });
    </script>
</body>
</html>
