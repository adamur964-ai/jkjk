<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-block border-4 border-[#002147] p-2 mb-4">
                <span class="text-3xl font-black text-[#002147]">TB</span>
            </div>
            <h1 class="text-2xl font-black text-[#002147] uppercase">Secure Login</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Node: Global-Auth-2026</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
            <div id="alertBox" class="hidden mb-6 p-4 bg-rose-50 border-l-4 border-rose-500 text-rose-700 text-xs font-bold uppercase"></div>

            <button id="googleBtn" class="w-full h-12 border border-slate-200 rounded-xl flex items-center justify-center gap-3 font-bold text-slate-600 hover:bg-slate-50 transition-all mb-6">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5">
                Continue with Google
            </button>

            <div class="relative flex items-center mb-6">
                <div class="flex-grow border-t border-slate-100"></div>
                <span class="px-4 text-[10px] font-bold text-slate-300 uppercase">OR</span>
                <div class="flex-grow border-t border-slate-100"></div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Email Address</label>
                    <input type="email" id="email" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 outline-none focus:border-[#002147]">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Secure Password</label>
                    <input type="password" id="password" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 outline-none focus:border-[#002147]">
                </div>
                <div class="flex justify-between items-center text-[10px] font-bold">
                    <a href="forget-password.html" class="text-[#002147] uppercase">Forgot Password?</a>
                    <a href="register.html" class="text-slate-400 uppercase">Create Account</a>
                </div>
                <button id="loginBtn" class="w-full h-14 bg-[#002147] text-white rounded-xl font-black uppercase tracking-widest shadow-lg">Access Portal</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, ADMIN_EMAIL } from './firebase-config.js';
        import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { showToast } from './toast.js';

        const alertBox = document.getElementById('alertBox');
        const loginBtn = document.getElementById('loginBtn');

        loginBtn.onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            if(!email || !pass) return;

            loginBtn.disabled = true;
            loginBtn.innerText = "AUTHENTICATING...";

            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                if(email === ADMIN_EMAIL) window.location.href = "admin-portal.html";
                else window.location.href = "dashboard.html";
            } catch (e) {
                alertBox.innerText = "Error: Invalid credentials or node failure.";
                alertBox.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.innerText = "Access Portal";
            }
        };

        document.getElementById('googleBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const res = await signInWithPopup(auth, provider);
                if(res.user.email === ADMIN_EMAIL) window.location.href = "admin-portal.html";
                else window.location.href = "dashboard.html";
            } catch (e) { showToast("Google Auth Failed", "error"); }
        };
    </script>
</body>
</html>
