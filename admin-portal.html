<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB | Executive Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: #001529; }
        .content { margin-left: 260px; padding: 40px; }
        .pane { display: none; }
        .pane.active { display: block; }
        .nav-link { padding: 15px 25px; display: flex; items-center: center; gap: 12px; color: #8aa4af; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.05); color: #D4AF37; border-left: 4px solid #D4AF37; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200">
    <aside class="sidebar border-r border-white/5">
        <div class="p-8 border-b border-white/5 mb-4">
            <h1 class="text-xl font-black text-white italic">TB <span class="text-[#D4AF37]">ADMIN</span></h1>
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">Management Node v12.16</p>
        </div>
        <div onclick="showPane('users')" class="nav-link active"><i class="fas fa-users"></i> Users</div>
        <div onclick="showPane('tasks')" class="nav-link"><i class="fas fa-tasks"></i> Requests</div>
        <div onclick="showPane('tickets')" class="nav-link"><i class="fas fa-headset"></i> Support Tickets</div>
        <div onclick="showPane('logs')" class="nav-link"><i class="fas fa-terminal"></i> Audit Logs</div>
        <div onclick="logout()" class="nav-link mt-auto text-rose-500"><i class="fas fa-power-off"></i> Terminate</div>
    </aside>

    <main class="content">
        <!-- Users Pane -->
        <div id="pane-users" class="pane active space-y-6">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black text-white uppercase italic">Accounts Registry</h2>
                <input type="text" id="search" oninput="renderUsers()" placeholder="Search by name, email, or account..." class="bg-slate-800 border border-white/10 rounded-xl px-6 py-3 w-80 outline-none focus:border-[#D4AF37]">
            </div>
            <div id="user-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>

        <!-- Tasks Pane -->
        <div id="pane-tasks" class="pane space-y-6">
            <h2 class="text-2xl font-black text-white uppercase italic mb-10">Financial Processing Queue</h2>
            <div id="task-list" class="space-y-4"></div>
        </div>

        <!-- Support Tickets Pane -->
        <div id="pane-tickets" class="pane space-y-6">
            <h2 class="text-2xl font-black text-white uppercase italic mb-10">Support Command</h2>
            <div id="ticket-list" class="space-y-4"></div>
        </div>
    </main>

    <script type="module">
        import { auth, db, ADMIN_EMAIL } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { collection, onSnapshot, doc, updateDoc, addDoc, increment, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        let users = [];
        let accounts = [];

        onAuthStateChanged(auth, u => {
            if(!u || u.email !== ADMIN_EMAIL) window.location.href="login.html";
            else sync();
        });

        async function sync() {
            onSnapshot(collection(db, "users"), snap => {
                users = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(u => u.email !== ADMIN_EMAIL);
                renderUsers();
                renderTasks();
            });
            onSnapshot(collection(db, "accounts"), snap => {
                accounts = snap.docs.map(d => d.data());
                renderUsers();
            });
            onSnapshot(query(collection(db, "supportTickets"), orderBy("lastUpdated", "desc")), snap => {
                renderTickets(snap.docs);
            });
        }

        window.renderUsers = () => {
            const grid = document.getElementById('user-grid');
            const q = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = "";
            users.forEach(u => {
                const acc = accounts.find(a => a.ownerUid === u.id);
                if(q && !u.name.toLowerCase().includes(q) && !u.email.toLowerCase().includes(q)) return;
                
                grid.innerHTML += `
                    <div class="bg-slate-800 p-6 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h4 class="text-white font-black uppercase text-sm">${u.name}</h4>
                                <p class="text-[10px] text-slate-500 font-bold">${u.email}</p>
                            </div>
                            <span class="badge ${u.status === 'ACTIVE' ? 'badge-success' : 'badge-failed'}">${u.status}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-4 mb-6">
                            <div><p class="text-[8px] font-black text-slate-500 uppercase">Available</p><p class="text-emerald-500 font-black">$${acc?.balAvailable.toLocaleString()}</p></div>
                            <div><p class="text-[8px] font-black text-slate-500 uppercase">Total</p><p class="text-white font-black">$${acc?.balTotal.toLocaleString()}</p></div>
                            <div><p class="text-[8px] font-black text-slate-500 uppercase">KYC</p><p class="text-[#D4AF37] font-black">${u.kycStatus}</p></div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="adjustBal('${u.id}')" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all">Balance</button>
                            <button onclick="toggleStatus('${u.id}', '${u.status}')" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all">Status</button>
                        </div>
                    </div>
                `;
            });
        };

        window.renderTasks = () => {
            const list = document.getElementById('task-list');
            list.innerHTML = "";
            users.forEach(u => {
                if(u.kycStatus === 'PENDING') list.innerHTML += taskCard(u, 'IDENTITY VERIFICATION', 'Review ID Documents', 'kyc', null, u.idFront);
                if(u.depositStatus === 'PENDING') list.innerHTML += taskCard(u, 'DEPOSIT SETTLEMENT', `$${u.depositAmount}`, 'deposit', u.depositAmount, u.depositProof);
                if(u.withdrawStatus === 'PENDING') list.innerHTML += taskCard(u, 'WITHDRAWAL AUDIT', `$${u.withdrawAmount}`, 'withdraw', u.withdrawAmount, null, u.withdrawDetails);
            });
        };

        const taskCard = (u, type, sub, key, amt, img, details) => `
            <div class="bg-slate-800 p-8 rounded-2xl border-l-8 border-[#D4AF37] flex justify-between items-center">
                <div class="flex gap-8 items-center">
                    ${img ? `<img src="${img}" onclick="window.open('${img}')" class="w-20 h-20 rounded-xl object-cover cursor-pointer">` : '<div class="w-20 h-20 bg-slate-700 rounded-xl flex items-center justify-center text-slate-500"><i class="fas fa-file-invoice-dollar text-2xl"></i></div>'}
                    <div>
                        <p class="text-[10px] font-black text-[#D4AF37] uppercase tracking-widest">${type}</p>
                        <h4 class="text-xl font-black text-white">${sub}</h4>
                        <p class="text-[11px] font-bold text-slate-500 mt-1">User: ${u.name} | UID: ${u.id.slice(0,8)}</p>
                        ${details ? `<p class="mt-2 text-[10px] text-slate-400 font-mono bg-black/20 p-2 rounded">${details}</p>` : ''}
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="processRequest('${u.id}', '${key}', 'SUCCESSFUL', ${amt})" class="bg-emerald-600 px-8 py-3 rounded-xl text-[10px] font-black uppercase">Approve</button>
                    <button onclick="processRequest('${u.id}', '${key}', 'DECLINED', ${amt})" class="bg-rose-600/10 text-rose-500 px-8 py-3 rounded-xl text-[10px] font-black uppercase">Reject</button>
                </div>
            </div>
        `;

        window.processRequest = async (uid, key, status, amt) => {
            const uRef = doc(db, "users", uid);
            const aRef = doc(db, "accounts", uid);
            const update = {};
            update[`${key}Status`] = status;
            
            if(status === 'SUCCESSFUL' && key === 'deposit') {
                await updateDoc(aRef, { balAvailable: increment(amt), balTotal: increment(amt) });
            }
            if(status === 'SUCCESSFUL' && key === 'kyc') update.kycStatus = 'VERIFIED';
            
            await updateDoc(uRef, update);
            await logAudit(`Approved ${key}`, uid);
        };

        window.adjustBal = async (uid) => {
            const val = prompt("Adjustment Amount (+/-):");
            if(val) {
                await updateDoc(doc(db, "accounts", uid), { balAvailable: increment(Number(val)) });
                await logAudit(`Adjusted Balance by ${val}`, uid);
            }
        };

        async function logAudit(action, target) {
            await addDoc(collection(db, "auditLogs"), { admin: ADMIN_EMAIL, action, target, timestamp: new Date().toISOString() });
        }

        window.showPane = (id) => {
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.getElementById('pane-'+id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
        };

        window.logout = () => signOut(auth).then(() => window.location.href="login.html");
    </script>
</body>
</html>
