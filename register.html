<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Account | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white tb-card p-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-[#002147] mb-2 tracking-tight">Open Your Account</h1>
            <p class="text-slate-400 font-medium text-sm">Start your premium banking journey</p>
        </div>

        <form id="register-form" class="space-y-6">
            <div>
                <label for="fullName">Full Legal Name</label>
                <input type="text" id="fullName" class="w-full" placeholder="Johnathan Doe" required>
            </div>
            <div>
                <label for="email">Email Address</label>
                <input type="email" id="email" class="w-full" placeholder="name@email.com" required>
            </div>
            <div>
                <label for="currency">Account Base Currency</label>
                <select id="currency" class="w-full" required>
                    <option value="USD">US Dollar ($)</option>
                    <option value="EUR">Euro (€)</option>
                    <option value="GBP">British Pound (£)</option>
                </select>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" class="w-full" placeholder="••••••••" required>
            </div>
            <div class="flex items-center gap-3 py-2">
                <input type="checkbox" id="terms" class="w-5 h-5 rounded border-slate-200" required>
                <label for="terms" class="mb-0 normal-case font-medium text-xs text-slate-500">I agree to the <a href="terms.html" class="text-[#002147] font-bold underline">Terms & Conditions</a></label>
            </div>
            
            <button type="submit" id="submit-btn" class="w-full btn-primary h-14 text-lg">Create Account</button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
            <div class="relative flex justify-center text-xs uppercase font-black text-slate-300 tracking-widest"><span class="bg-white px-4">OR</span></div>
        </div>

        <button id="google-btn" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-100 transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span class="text-slate-600 font-bold">Continue with Google</span>
        </button>

        <p class="text-center mt-8 text-sm font-medium text-slate-400">
            Already a member? <a href="login.html" class="text-[#002147] font-black uppercase text-[10px] tracking-wider ml-1">Login</a>
        </p>
    </div>

    <script type="module">
        import { auth, db, googleProvider } from './firebase-config.js';
        import { createUserWithEmailAndPassword, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { showToast } from './toast.js';
        import { saveSession } from './session.js';

        const registerForm = document.getElementById('register-form');
        const submitBtn = document.getElementById('submit-btn');
        const googleBtn = document.getElementById('google-btn');

        const createAccountInDb = async (uid, email, fullName, currency) => {
            const accNum = Math.floor(1000000000 + Math.random() * 9000000000).toString();
            
            // User Doc
            await setDoc(doc(db, "users", uid), {
                uid, fullName, email,
                authProvider: "password",
                role: "customer",
                status: "active",
                kycStatus: "NONE",
                createdAt: serverTimestamp()
            });

            // Account Doc
            await setDoc(doc(db, "accounts", accNum), {
                accountNumber: accNum,
                ownerUid: uid,
                currency,
                availableBalance: 0,
                totalBalance: 0,
                savingsBalance: 0,
                accountType: "Individual",
                createdAt: serverTimestamp()
            });

            saveSession({ uid, fullName, accNum });
            window.location.href = "welcome.html";
        };

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            const currency = document.getElementById('currency').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await createAccountInDb(userCredential.user.uid, email, fullName, currency);
            } catch (error) {
                showToast(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create Account';
            }
        });

        googleBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                // For Google, we might need to prompt for currency if it's new
                // Defaulting to USD for simplicity in this flow, user can change in settings
                await createAccountInDb(result.user.uid, result.user.email, result.user.displayName, "USD");
            } catch (error) {
                showToast(error.message, 'error');
            }
        });
    </script>
</body>
</html>
