<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Card Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <button onclick="history.back()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-400 border border-slate-100"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-sm font-black uppercase text-[#002147]">Card Center</h1>
            <div class="w-10"></div>
        </header>

        <!-- Card Preview -->
        <div class="bg-gradient-to-br from-slate-900 to-slate-800 p-8 rounded-3xl text-white shadow-2xl relative overflow-hidden aspect-[1.58/1] mb-10">
            <div class="absolute top-0 right-0 p-8 opacity-20"><i class="fas fa-university text-7xl"></i></div>
            <div class="flex justify-between items-start">
                <span class="text-[10px] font-black uppercase tracking-widest text-[#D4AF37]">Trust Bank Platinum</span>
                <i class="fab fa-cc-visa text-3xl"></i>
            </div>
            <div class="mt-10">
                <p class="text-xl font-mono tracking-[4px]">**** **** **** <span id="cardEnd">0000</span></p>
                <div class="flex gap-10 mt-6">
                    <div>
                        <p class="text-[7px] uppercase font-bold opacity-50">Expiry</p>
                        <p class="text-[10px] font-bold">12/28</p>
                    </div>
                    <div>
                        <p class="text-[7px] uppercase font-bold opacity-50">CVV</p>
                        <p class="text-[10px] font-bold">***</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Manage Status</h3>
            
            <div id="noCard" class="text-center py-4">
                <p class="text-xs font-bold text-slate-400 uppercase">No active virtual cards found</p>
                <button id="reqBtn" class="w-full h-14 bg-[#002147] text-white rounded-2xl font-black uppercase tracking-widest shadow-lg mt-6">Issue Virtual Card</button>
            </div>

            <div id="activeCard" class="hidden space-y-4">
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-lock text-[#002147]"></i>
                        <span class="text-[10px] font-black uppercase text-slate-800">Card Lock</span>
                    </div>
                    <div class="w-10 h-5 bg-emerald-500 rounded-full relative"><div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div></div>
                </div>
                <p class="text-[8px] font-bold text-slate-400 text-center uppercase tracking-tighter">Your virtual card is active and ready for online settlement.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { showToast } from './toast.js';

        onAuthStateChanged(auth, user => {
            if(!user) return;
            onSnapshot(doc(db, "users", user.uid), snap => {
                const d = snap.data();
                if(d.cardStatus === 'ACTIVE') {
                    document.getElementById('noCard').classList.add('hidden');
                    document.getElementById('activeCard').classList.remove('hidden');
                    document.getElementById('cardEnd').innerText = d.cardNumber.slice(-4);
                }
            });
        });

        document.getElementById('reqBtn').onclick = async () => {
            const num = Math.floor(4000 + Math.random() * 1000) + " " + Math.floor(1000 + Math.random() * 9000) + " " + Math.floor(1000 + Math.random() * 9000) + " " + Math.floor(1000 + Math.random() * 9000);
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    cardStatus: 'ACTIVE',
                    cardNumber: num
                });
                showToast("Virtual Card Issued");
            } catch (e) { showToast("System Error", "error"); }
        };
    </script>
</body>
</html>
