<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center">
        <div class="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl shadow-emerald-500/10">
            <i class="fa-solid fa-check text-4xl"></i>
        </div>
        
        <h1 class="text-4xl font-black text-[#002147] mb-4 tracking-tight">Registration Complete!</h1>
        <p class="text-slate-500 mb-10 leading-relaxed px-4">Welcome to the family. Your account is ready, and your secure banking dashboard is waiting.</p>

        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 mb-10 shadow-xl shadow-navy-900/5">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">New Account Number</span>
            <div id="acc-display" class="text-2xl font-black text-[#002147] tracking-widest bg-slate-50 py-4 rounded-2xl border border-slate-100">
                ---
            </div>
            <div class="mt-6 space-y-4 text-left">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-[#002147]/5 text-[#002147] flex items-center justify-center text-sm font-bold">1</div>
                    <p class="text-xs font-bold text-slate-600 uppercase">Complete Identity (KYC)</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-[#002147]/5 text-[#002147] flex items-center justify-center text-sm font-bold">2</div>
                    <p class="text-xs font-bold text-slate-600 uppercase">Make your first Deposit</p>
                </div>
            </div>
        </div>

        <a href="dashboard.html" class="inline-block w-full btn-primary h-16 leading-[4rem] text-lg shadow-xl shadow-navy-900/20">Go to Dashboard</a>
    </div>

    <script type="module">
        import { getSession } from './session.js';
        const session = getSession();
        if (session && session.accNum) {
            document.getElementById('acc-display').innerText = session.accNum.replace(/(\d{3})(\d{3})(\d{4})/, '$1 $2 $3');
        }
    </script>
</body>
</html>
