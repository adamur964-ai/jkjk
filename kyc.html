<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Identity Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <button onclick="history.back()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-400 border border-slate-100"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-sm font-black uppercase text-[#002147]">Identity Terminal</h1>
            <div class="w-10"></div>
        </header>

        <div id="statusHeader" class="hidden mb-6 p-4 rounded-2xl border-l-4">
            <p id="statusTag" class="text-[9px] font-black uppercase"></p>
            <p id="statusMsg" class="text-[11px] font-bold mt-1"></p>
        </div>

        <div id="formView" class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Document Type</label>
                    <select id="docType" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl px-4 font-bold text-xs mt-1">
                        <option value="Passport">International Passport</option>
                        <option value="ID">National Identity Card</option>
                        <option value="License">Driver's License</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="document.getElementById('fIn').click()" class="h-32 border-2 border-dashed border-slate-100 rounded-2xl flex flex-col items-center justify-center bg-slate-50 relative overflow-hidden">
                        <img id="fPrev" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                        <i class="fas fa-camera text-slate-200 text-xl"></i>
                        <span class="text-[8px] font-black text-slate-300 uppercase mt-2">Front Side</span>
                        <input type="file" id="fIn" hidden accept="image/*">
                    </div>
                    <div onclick="document.getElementById('bIn').click()" class="h-32 border-2 border-dashed border-slate-100 rounded-2xl flex flex-col items-center justify-center bg-slate-50 relative overflow-hidden">
                        <img id="bPrev" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                        <i class="fas fa-camera text-slate-200 text-xl"></i>
                        <span class="text-[8px] font-black text-slate-300 uppercase mt-2">Back Side</span>
                        <input type="file" id="bIn" hidden accept="image/*">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">SSN / Tax Identification</label>
                    <input type="password" id="ssn" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl px-4 font-bold outline-none focus:border-[#002147]" placeholder="Required for compliance">
                </div>

                <button id="subBtn" class="w-full h-14 bg-[#002147] text-white rounded-2xl font-black uppercase tracking-widest shadow-lg">Submit Identity</button>
            </div>
        </div>

        <div id="pendView" class="hidden text-center py-20 bg-white rounded-3xl shadow-xl border border-slate-100">
            <i class="fas fa-fingerprint text-5xl text-[#002147] animate-pulse mb-6"></i>
            <h2 class="text-xl font-black text-[#002147] uppercase">Audit in Progress</h2>
            <p class="text-xs text-slate-400 font-bold uppercase mt-2 px-10">Our security node is validating your biometrics and government records.</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { showToast } from './toast.js';

        let fData = "", bData = "";

        const handleImage = (file, side) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                if(side === 'f') fData = e.target.result; else bData = e.target.result;
                const prev = document.getElementById(side + 'Prev');
                prev.src = e.target.result;
                prev.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('fIn').onchange = (e) => handleImage(e.target.files[0], 'f');
        document.getElementById('bIn').onchange = (e) => handleImage(e.target.files[0], 'b');

        onAuthStateChanged(auth, user => {
            if(!user) return;
            onSnapshot(doc(db, "users", user.uid), snap => {
                const d = snap.data();
                const status = d.kycStatus;
                const head = document.getElementById('statusHeader');
                const tag = document.getElementById('statusTag');
                const msg = document.getElementById('statusMsg');

                if(status === 'PENDING') {
                    document.getElementById('formView').classList.add('hidden');
                    document.getElementById('pendView').classList.remove('hidden');
                } else if (status === 'DECLINED') {
                    head.classList.remove('hidden');
                    head.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                    tag.innerText = "Action Required: Rejected";
                    msg.innerText = d.kycReason || "Documents provided were unreadable or inconsistent.";
                } else if (status === 'VERIFIED') {
                    head.classList.remove('hidden');
                    head.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
                    tag.innerText = "Trust Level: Verified";
                    msg.innerText = "Your identity is confirmed. Full banking features unlocked.";
                    document.getElementById('formView').classList.add('hidden');
                }
            });
        });

        document.getElementById('subBtn').onclick = async () => {
            if(!fData || !bData || !document.getElementById('ssn').value) {
                showToast("All documents and SSN required", "error");
                return;
            }
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    kycStatus: 'PENDING',
                    idFront: fData,
                    idBack: bData,
                    ssnMasked: document.getElementById('ssn').value.slice(-4)
                });
                showToast("Identity Submitted");
            } catch (e) { showToast("Upload Failed", "error"); }
        };
    </script>
</body>
</html>
