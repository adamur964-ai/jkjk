<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 pb-32">
    <div id="header-container"></div>
    <main class="max-w-md mx-auto px-6 pt-8">
        <form id="withdraw-form" class="space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-xl shadow-navy-900/5">
                <div class="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center justify-between">
                    <span class="text-[10px] font-black uppercase text-rose-800 tracking-wider">Available</span>
                    <span id="avail-balance" class="font-black text-rose-800 tracking-tight">$0.00</span>
                </div>

                <div class="mb-8">
                    <label>Amount to Withdraw</label>
                    <input type="number" id="amount" class="w-full" placeholder="0.00" required>
                </div>

                <div class="mb-8">
                    <label>Destination Account / Method</label>
                    <textarea id="details" class="w-full h-32 py-4" placeholder="Enter bank name, account number, routing, or wallet address..." required></textarea>
                </div>
            </div>
            <button type="submit" id="submit-btn" class="w-full btn-primary h-16 shadow-xl shadow-navy-900/20">Request Withdrawal</button>
        </form>
    </main>
    <div id="nav-container"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { renderHeader, renderBottomNav } from './components.js';
        import { showToast } from './toast.js';
        import { formatCurrency } from './utils.js';

        let currentBalance = 0;
        let userCurrency = 'USD';

        document.getElementById('header-container').innerHTML = renderHeader('Withdraw Funds', true);
        document.getElementById('nav-container').innerHTML = renderBottomNav('dashboard');

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const q = query(collection(db, "accounts"), where("ownerUid", "==", user.uid));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    const acc = snap.docs[0].data();
                    currentBalance = acc.availableBalance;
                    userCurrency = acc.currency;
                    document.getElementById('avail-balance').innerText = formatCurrency(currentBalance, userCurrency);
                }
            }
        });

        document.getElementById('withdraw-form').onsubmit = async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const btn = document.getElementById('submit-btn');

            if (amount > currentBalance) {
                showToast("Insufficient funds available.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';

            try {
                await addDoc(collection(db, "withdrawals"), {
                    uid: auth.currentUser.uid,
                    amount: amount,
                    currency: userCurrency,
                    destinationDetails: document.getElementById('details').value,
                    status: "PENDING",
                    createdAt: serverTimestamp()
                });
                showToast("Withdrawal request sent.", "success");
                document.getElementById('withdraw-form').reset();
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Request Withdrawal';
            }
        };
    </script>
</body>
</html>
