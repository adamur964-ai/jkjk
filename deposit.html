<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Deposit Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <button onclick="history.back()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-400 border border-slate-100"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-sm font-black uppercase text-[#002147]">Deposit Terminal</h1>
            <div class="w-10"></div>
        </header>

        <div id="formView" class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
            <div class="mb-6">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Asset Channel</label>
                <select id="method" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl px-4 font-bold text-xs mt-2">
                    <option value="Wire Transfer">Federal Wire / SWIFT</option>
                    <option value="Mobile Check">Digital Check Deposit</option>
                    <option value="Crypto">Blockchain Settlement (USDT/BTC)</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Deposit Amount</label>
                <div class="relative mt-2">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 font-black text-slate-300">$</span>
                    <input type="number" id="amt" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl pl-10 pr-4 font-black text-lg outline-none focus:border-[#002147]" placeholder="0.00">
                </div>
            </div>

            <div class="mb-8">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Upload Receipt / Proof</label>
                <div onclick="document.getElementById('file').click()" class="mt-2 border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center bg-slate-50 cursor-pointer relative overflow-hidden">
                    <img id="prev" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                    <i class="fas fa-cloud-upload-alt text-2xl text-slate-300 mb-2"></i>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Click to browse files</p>
                    <input type="file" id="file" class="hidden" accept="image/*">
                </div>
            </div>

            <button id="subBtn" class="w-full h-14 bg-[#002147] text-white rounded-2xl font-black uppercase tracking-widest shadow-lg">Transmit Deposit</button>
        </div>

        <!-- States -->
        <div id="pendView" class="hidden text-center py-20">
            <div class="w-16 h-16 border-4 border-[#002147] border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <h2 class="text-xl font-black text-[#002147] uppercase">Audit Active</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-2">Treasury is validating your settlement proof</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { showToast } from './toast.js';

        let base64 = null;

        document.getElementById('file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                base64 = ev.target.result;
                document.getElementById('prev').src = base64;
                document.getElementById('prev').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        onAuthStateChanged(auth, user => {
            if(!user) return;
            onSnapshot(doc(db, "users", user.uid), snap => {
                const status = snap.data().depositStatus;
                if(status === 'PENDING') {
                    document.getElementById('formView').classList.add('hidden');
                    document.getElementById('pendView').classList.remove('hidden');
                } else {
                    document.getElementById('formView').classList.remove('hidden');
                    document.getElementById('pendView').classList.add('hidden');
                }
            });
        });

        document.getElementById('subBtn').onclick = async () => {
            const amt = document.getElementById('amt').value;
            if(!amt || !base64) { showToast("Amount and proof required", "error"); return; }
            
            document.getElementById('subBtn').disabled = true;
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    depositStatus: 'PENDING',
                    depositAmount: Number(amt),
                    depositProof: base64,
                    depositMethod: document.getElementById('method').value
                });
                showToast("Transmission Successful");
            } catch (e) { showToast("System Error", "error"); }
        };
    </script>
</body>
</html>
