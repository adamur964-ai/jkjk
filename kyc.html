<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 pb-32">
    <div id="header-container"></div>
    <main class="max-w-md mx-auto px-6 pt-8">
        <div id="status-card" class="mb-8 bg-white p-6 rounded-[2.5rem] border border-slate-200 flex items-center justify-between">
            <div>
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">KYC Status</p>
                <p id="kyc-text" class="font-black text-[#002147]">Checking...</p>
            </div>
            <div id="kyc-badge"></div>
        </div>

        <form id="kyc-form" class="space-y-6 hidden">
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200">
                <div class="mb-8">
                    <label>Document Type</label>
                    <select id="doc-type" class="w-full">
                        <option>Passport</option>
                        <option>Driver's License</option>
                        <option>National ID Card</option>
                    </select>
                </div>
                <div>
                    <label>Upload Document Front</label>
                    <input type="file" id="kyc-file" class="w-full" accept="image/*" required>
                </div>
            </div>
            <button type="submit" id="submit-btn" class="w-full btn-primary h-16">Submit for Verification</button>
        </form>
    </main>
    <div id="nav-container"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, setDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { renderHeader, renderBottomNav, renderStatusBadge } from './components.js';
        import { compressImage } from './utils.js';
        import { showToast } from './toast.js';

        document.getElementById('header-container').innerHTML = renderHeader('Identity (KYC)', true);
        document.getElementById('nav-container').innerHTML = renderBottomNav('settings');

        auth.onAuthStateChanged(user => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snapshot) => {
                    const data = snapshot.data();
                    document.getElementById('kyc-text').innerText = data.kycStatus || 'NOT STARTED';
                    document.getElementById('kyc-badge').innerHTML = renderStatusBadge(data.kycStatus || 'PENDING');
                    
                    if (data.kycStatus === 'NONE' || data.kycStatus === 'REJECTED') {
                        document.getElementById('kyc-form').classList.remove('hidden');
                    } else {
                        document.getElementById('kyc-form').classList.add('hidden');
                    }
                });
            }
        });

        document.getElementById('kyc-form').onsubmit = async (e) => {
            e.preventDefault();
            const file = document.getElementById('kyc-file').files[0];
            const btn = document.getElementById('submit-btn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Uploading...';

            try {
                const base64 = await compressImage(file);
                await setDoc(doc(db, "kyc", auth.currentUser.uid), {
                    uid: auth.currentUser.uid,
                    documentType: document.getElementById('doc-type').value,
                    documentImage: base64,
                    status: "PENDING",
                    submittedAt: serverTimestamp()
                });
                await setDoc(doc(db, "users", auth.currentUser.uid), { kycStatus: "PENDING" }, { merge: true });
                showToast("KYC Documents Submitted!", "success");
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Submit for Verification';
            }
        };
    </script>
</body>
</html>
