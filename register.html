<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Initialize Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen py-10 px-6">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block border-4 border-[#002147] p-2 mb-4">
                <span class="text-3xl font-black text-[#002147]">TB</span>
            </a>
            <h1 class="text-2xl font-black text-[#002147] uppercase">Account Setup</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Personal & Business Enrollment</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
            <div id="alertBox" class="hidden mb-6 p-4 bg-rose-50 border-l-4 border-rose-500 text-rose-700 text-xs font-bold uppercase"></div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Full Legal Name</label>
                    <input type="text" id="name" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 outline-none focus:border-[#002147]">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Email Registry</label>
                    <input type="email" id="email" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 outline-none focus:border-[#002147]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Base Currency</label>
                        <select id="currency" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 font-bold text-xs">
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                            <option value="GBP">GBP (£)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Account Type</label>
                        <select id="type" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 font-bold text-xs">
                            <option value="Personal">Personal</option>
                            <option value="Business">Business</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Secure Password</label>
                    <input type="password" id="password" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 outline-none focus:border-[#002147]">
                </div>
                <div class="flex items-start gap-3 py-2">
                    <input type="checkbox" id="terms" class="mt-1 w-4 h-4 accent-[#002147]">
                    <label for="terms" class="text-[9px] font-bold text-slate-400 uppercase leading-relaxed">I agree to the <a href="terms.html" class="text-[#002147] underline">Compliance & Disclosure Agreement</a>.</label>
                </div>
                <button id="regBtn" class="w-full h-14 bg-[#002147] text-white rounded-xl font-black uppercase tracking-widest shadow-lg mt-4">Initialize Account</button>
            </div>
            <p class="text-center text-[10px] font-bold text-slate-400 uppercase mt-6">Already enrolled? <a href="login.html" class="text-[#002147]">Login</a></p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const regBtn = document.getElementById('regBtn');
        const alertBox = document.getElementById('alertBox');

        regBtn.onclick = async () => {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.toLowerCase().trim();
            const curr = document.getElementById('currency').value;
            const type = document.getElementById('type').value;
            const pass = document.getElementById('password').value;
            const terms = document.getElementById('terms').checked;

            if(!name || !email || !pass || !terms) {
                alertBox.innerText = "Error: All fields and terms required.";
                alertBox.classList.remove('hidden');
                return;
            }

            regBtn.disabled = true;
            regBtn.innerText = "PROVISIONING...";

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                const accNum = Math.floor(1000000000 + Math.random() * 9000000000).toString();

                await setDoc(doc(db, "users", cred.user.uid), {
                    uid: cred.user.uid,
                    fullName: name,
                    email: email,
                    currency: curr,
                    accType: type,
                    accNumber: accNum,
                    balAvailable: 0,
                    balTotal: 0,
                    balSavings: 0,
                    status: 'ACTIVE',
                    role: 'CUSTOMER',
                    createdAt: new Date().toISOString(),
                    kycStatus: 'PENDING',
                    transactionPin: null
                });

                window.location.href = "welcome.html";
            } catch (e) {
                alertBox.innerText = e.message;
                alertBox.classList.remove('hidden');
                regBtn.disabled = false;
                regBtn.innerText = "Initialize Account";
            }
        };
    </script>
</body>
</html>
