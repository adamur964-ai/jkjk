<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB | Support Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <div id="app-header"></div>
    
    <main id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4">
        <!-- Messages Injected -->
    </main>

    <footer class="p-4 bg-white border-t border-slate-100 sticky bottom-0">
        <div class="max-w-md mx-auto flex gap-2">
            <input type="text" id="msg" class="flex-1 h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 text-sm font-bold outline-none focus:border-[#002147]" placeholder="Message support node...">
            <button id="sendBtn" class="w-12 h-12 gradient-navy text-white rounded-xl shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
    </footer>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { collection, query, where, onSnapshot, addDoc, doc, updateDoc, serverTimestamp, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { renderHeader } from './components.js';

        let activeTicketId = null;

        onAuthStateChanged(auth, async user => {
            if(!user) return;
            renderHeader("Support Node 4");

            // Load existing ticket or create one
            const q = query(collection(db, "supportTickets"), where("uid", "==", user.uid), where("status", "==", "OPEN"));
            const snap = await getDocs(q);
            
            if(snap.empty) {
                const newTicket = await addDoc(collection(db, "supportTickets"), {
                    uid: user.uid,
                    status: 'OPEN',
                    lastUpdated: new Date().toISOString()
                });
                activeTicketId = newTicket.id;
            } else {
                activeTicketId = snap.docs[0].id;
            }

            // Real-time message sync
            onSnapshot(query(collection(db, `supportTickets/${activeTicketId}/messages`), orderBy("time", "asc")), s => {
                const window = document.getElementById('chat-window');
                window.innerHTML = `<div class="bg-white p-4 rounded-2xl border border-slate-100 text-[11px] font-bold text-slate-500 max-w-[80%] mb-4 italic">Welcome. Officer Miller is monitoring this node. State your request.</div>`;
                s.forEach(d => {
                    const m = d.data();
                    window.innerHTML += `
                        <div class="p-4 rounded-2xl text-[11px] font-bold max-w-[85%] ${m.sender === 'USER' ? 'bg-[#002147] text-white self-end ml-auto rounded-br-none' : 'bg-white border border-slate-100 text-slate-800 self-start rounded-bl-none shadow-sm'}">
                            ${m.text}
                        </div>
                    `;
                });
                window.scrollTo(0, window.scrollHeight);
            });
        });

        document.getElementById('sendBtn').onclick = async () => {
            const text = document.getElementById('msg').value;
            if(!text || !activeTicketId) return;
            
            await addDoc(collection(db, `supportTickets/${activeTicketId}/messages`), {
                sender: 'USER',
                text: text,
                time: new Date().toISOString()
            });
            await updateDoc(doc(db, "supportTickets", activeTicketId), { lastUpdated: new Date().toISOString() });
            document.getElementById('msg').value = "";
        };
    </script>
</body>
</html>
