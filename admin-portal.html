<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB | Executive Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .pane { display: none; }
        .pane.active { display: block; }
        .admin-nav-item.active { color: #D4AF37; border-bottom: 2px solid #D4AF37; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <header class="p-6 bg-slate-800 border-b border-slate-700 flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-black text-white italic">TB <span class="text-[#D4AF37]">EXECUTIVE</span></h1>
            <p id="stats" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Global Nodes: 0</p>
        </div>
        <button onclick="logout()" class="w-10 h-10 rounded-xl bg-rose-500/10 text-rose-500 border border-rose-500/20"><i class="fas fa-power-off"></i></button>
    </header>

    <nav class="flex bg-slate-800 border-b border-slate-700 overflow-x-auto">
        <button onclick="go('users', this)" class="admin-nav-item active px-6 py-4 text-[10px] font-black uppercase whitespace-nowrap">Users</button>
        <button onclick="go('requests', this)" class="admin-nav-item px-6 py-4 text-[10px] font-black uppercase whitespace-nowrap">Banking Tasks</button>
        <button onclick="go('chat', this)" class="admin-nav-item px-6 py-4 text-[10px] font-black uppercase whitespace-nowrap">Support Hub</button>
    </nav>

    <main class="p-6 max-w-5xl mx-auto pb-32">
        <!-- User Management -->
        <div id="pane-users" class="pane active space-y-4">
            <input type="text" id="search" oninput="render()" placeholder="Search accounts by name/email..." class="w-full h-12 bg-slate-800 border border-slate-700 rounded-xl px-4 text-xs outline-none focus:border-[#D4AF37]">
            <div id="userList" class="space-y-4"></div>
        </div>

        <!-- Request Processing -->
        <div id="pane-requests" class="pane space-y-4">
            <h3 class="text-xs font-black text-[#D4AF37] uppercase">Pending Authorizations</h3>
            <div id="taskList" class="space-y-4"></div>
        </div>

        <!-- Chat Hub -->
        <div id="pane-chat" class="pane space-y-4">
            <h3 class="text-xs font-black text-[#D4AF37] uppercase">Active Support Sessions</h3>
            <div id="chatList" class="space-y-2"></div>
        </div>
    </main>

    <!-- Chat Modal -->
    <div id="chatModal" class="fixed inset-0 bg-slate-900 z-[100] hidden flex flex-col">
        <div class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
            <button onclick="closeChat()" class="text-slate-400"><i class="fas fa-times"></i></button>
            <span id="chatTitle" class="text-xs font-black uppercase">...</span>
            <div class="w-4"></div>
        </div>
        <div id="chatMsgs" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-4 bg-slate-800 border-t border-slate-700 flex gap-2">
            <input type="text" id="msgIn" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 text-sm" placeholder="Reply as TB Executive...">
            <button id="sendBtn" class="w-12 h-12 bg-[#D4AF37] text-slate-900 rounded-xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAIL } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { collection, onSnapshot, doc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        let users = [];
        let activeChatId = null;

        onAuthStateChanged(auth, u => {
            if(!u || u.email !== ADMIN_EMAIL) window.location.href="login.html";
            else sync();
        });

        function sync() {
            onSnapshot(collection(db, "users"), snap => {
                users = [];
                snap.forEach(d => { if(d.data().email !== ADMIN_EMAIL) users.push({id: d.id, ...d.data()}); });
                document.getElementById('stats').innerText = `GLOBAL NODES: ${users.length}`;
                render();
            });
        }

        window.render = () => {
            const q = document.getElementById('search').value.toLowerCase();
            const uList = document.getElementById('userList');
            const tList = document.getElementById('taskList');
            const cList = document.getElementById('chatList');
            
            uList.innerHTML = ""; tList.innerHTML = ""; cList.innerHTML = "";

            users.forEach(u => {
                if(q && !u.fullName.toLowerCase().includes(q) && !u.email.toLowerCase().includes(q)) return;

                // User Row
                uList.innerHTML += `
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-black text-[#D4AF37] uppercase">${u.accNumber}</p>
                            <h4 class="font-black text-white uppercase">${u.fullName}</h4>
                            <p class="text-[9px] text-slate-500">${u.email}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-emerald-500">$${u.balAvailable.toLocaleString()}</p>
                            <p class="text-[8px] font-bold text-slate-500 uppercase">Available Balance</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="adjustBal('${u.id}')" class="px-4 py-2 bg-slate-700 rounded-lg text-[9px] font-black uppercase">Adjust</button>
                        <button onclick="toggleVerify('${u.id}', '${u.kycStatus}')" class="px-4 py-2 ${u.kycStatus === 'VERIFIED' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-slate-700'} rounded-lg text-[9px] font-black uppercase">Verify</button>
                        <button onclick="openChat('${u.id}', '${u.fullName}')" class="px-4 py-2 bg-slate-700 rounded-lg text-[9px] font-black uppercase">Chat</button>
                    </div>
                </div>`;

                // Task Logic
                if(u.depositStatus === 'PENDING') tList.innerHTML += task(u, 'DEPOSIT', u.depositAmount, u.depositProof);
                if(u.withdrawStatus === 'PENDING') tList.innerHTML += task(u, 'WITHDRAW', u.withdrawAmount, null, u.withdrawDetails);
                if(u.loanStatus === 'PENDING') tList.innerHTML += task(u, 'LOAN', u.loanAmount);
                
                // Chat List
                if(u.chatHistory?.length) {
                    const last = u.chatHistory[u.chatHistory.length-1];
                    cList.innerHTML += `
                    <button onclick="openChat('${u.id}', '${u.fullName}')" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 flex justify-between items-center">
                        <span class="text-[10px] font-black uppercase">${u.fullName}</span>
                        <span class="text-[8px] text-slate-500">${new Date(last.time).toLocaleTimeString()}</span>
                    </button>`;
                }
            });
        };

        const task = (u, type, amt, img = null, details = null) => `
        <div class="bg-slate-800 p-6 rounded-2xl border-l-4 border-[#D4AF37]">
            <p class="text-[10px] font-black uppercase text-slate-500">${u.fullName} Requesting</p>
            <h4 class="text-lg font-black text-white">${type}: $${amt.toLocaleString()}</h4>
            ${img ? `<img src="${img}" class="mt-4 w-32 rounded-lg border border-slate-700">` : ''}
            ${details ? `<p class="mt-2 text-[10px] text-slate-400 font-mono">${details}</p>` : ''}
            <div class="flex gap-2 mt-4">
                <button onclick="process('${u.id}', '${type}', 'SUCCESSFUL', ${amt})" class="bg-emerald-600 px-6 py-2 rounded-lg text-[9px] font-black uppercase">Approve</button>
                <button onclick="process('${u.id}', '${type}', 'DECLINED', 0)" class="bg-rose-600 px-6 py-2 rounded-lg text-[9px] font-black uppercase">Decline</button>
            </div>
        </div>`;

        window.adjustBal = async (id) => {
            const val = prompt("Enter Adjustment (+/-):");
            if(val) await updateDoc(doc(db, "users", id), { balAvailable: increment(Number(val)) });
        };

        window.toggleVerify = async (id, cur) => {
            await updateDoc(doc(db, "users", id), { kycStatus: cur === 'VERIFIED' ? 'PENDING' : 'VERIFIED' });
        };

        window.process = async (uid, type, status, amt) => {
            const uRef = doc(db, "users", uid);
            const update = {};
            update[`${type.toLowerCase()}Status`] = status;
            if(status === 'SUCCESSFUL' && type === 'DEPOSIT') update.balAvailable = increment(amt);
            
            await updateDoc(uRef, update);
        };

        window.openChat = (id, name) => {
            activeChatId = id;
            document.getElementById('chatTitle').innerText = name;
            document.getElementById('chatModal').classList.remove('hidden');
            onSnapshot(doc(db, "users", id), s => {
                const h = s.data().chatHistory || [];
                document.getElementById('chatMsgs').innerHTML = h.map(m => `
                    <div class="p-3 rounded-xl max-w-[80%] ${m.sender === 'ADMIN' ? 'bg-[#D4AF37] text-slate-900 self-end' : 'bg-slate-700 text-white self-start'}">
                        <p class="text-xs font-bold">${m.text}</p>
                    </div>`).join('');
            });
        };

        document.getElementById('sendBtn').onclick = async () => {
            const t = document.getElementById('msgIn').value;
            if(!t || !activeChatId) return;
            await updateDoc(doc(db, "users", activeChatId), {
                chatHistory: arrayUnion({ sender: 'ADMIN', text: t, time: new Date().toISOString() })
            });
            document.getElementById('msgIn').value = "";
        };

        window.go = (id, btn) => {
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.getElementById('pane-'+id).classList.add('active');
            document.querySelectorAll('.admin-nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        window.closeChat = () => document.getElementById('chatModal').classList.add('hidden');
        window.logout = () => signOut(auth).then(() => window.location.href="login.html");
    </script>
</body>
</html>
