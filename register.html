<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB | Initialize Case</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-in">
        <div class="text-center mb-10">
            <div class="inline-block w-14 h-14 gradient-navy text-white rounded-2xl flex items-center justify-center font-black text-2xl mb-4 shadow-xl">TB</div>
            <h1 class="text-3xl font-black text-slate-800 uppercase tracking-tighter">Case Enrollment</h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[3px] mt-2">Personal Identity Registration</p>
        </div>

        <div class="glass-card p-8 tb-shadow">
            <div class="space-y-5 input-group">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-1">Legal Full Name</label>
                    <input type="text" id="name" placeholder="Johnathan Doe" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-1">Email Registry</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-1">Currency</label>
                        <select id="currency">
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                            <option value="GBP">GBP (£)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-1">Passkey</label>
                        <input type="password" id="pass" placeholder="••••••••" required>
                    </div>
                </div>
                <button id="regBtn" class="btn-primary w-full shadow-lg shadow-blue-900/20 mt-4">Initialize Account</button>
            </div>
            <p class="text-center text-[10px] font-black text-slate-400 uppercase mt-8">Returning Personnel? <a href="login.html" class="text-[#D4AF37]">Login here</a></p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { notify } from './toast.js';

        document.getElementById('regBtn').onclick = async () => {
            const btn = document.getElementById('regBtn');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const pass = document.getElementById('pass').value;
            const currency = document.getElementById('currency').value;

            if(!name || !email || !pass) return notify("All fields are required", "error");
            
            btn.disabled = true;
            btn.innerText = "PROVISIONING...";

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                const uid = cred.user.uid;
                const accNum = Math.floor(1000000000 + Math.random() * 9000000000).toString();

                // 1. User Profile
                await setDoc(doc(db, "users", uid), {
                    uid, name, email, role: 'CUSTOMER', status: 'ACTIVE', kycStatus: 'PENDING'
                });

                // 2. Multi-Collection Account Doc
                await setDoc(doc(db, "accounts", uid), {
                    ownerUid: uid,
                    accNumber: accNum,
                    currency,
                    balAvailable: 0,
                    balTotal: 0,
                    balSavings: 0,
                    createdAt: new Date().toISOString()
                });

                window.location.href = "welcome.html";
            } catch (e) {
                notify(e.message, "error");
                btn.disabled = false;
                btn.innerText = "Initialize Account";
            }
        };
    </script>
</body>
</html>
