<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white tb-card p-10">
        <div class="mb-10">
            <a href="login.html" class="text-slate-400 hover:text-[#002147] mb-6 inline-block"><i class="fa-solid fa-arrow-left mr-2"></i> Back to Login</a>
            <h1 class="text-3xl font-black text-[#002147] tracking-tight">Reset Password</h1>
            <p class="text-slate-400 font-medium text-sm mt-2">Enter your email to receive recovery instructions.</p>
        </div>

        <form id="reset-form" class="space-y-6">
            <div>
                <label for="email">Email Address</label>
                <input type="email" id="email" class="w-full" placeholder="name@email.com" required>
            </div>
            <button type="submit" id="submit-btn" class="w-full btn-primary h-14 shadow-lg">Send Recovery Email</button>
        </form>

        <div id="success-view" class="hidden text-center py-6">
            <div class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-paper-plane text-2xl"></i>
            </div>
            <h3 class="font-black text-[#002147] text-xl mb-2">Check Your Inbox</h3>
            <p class="text-slate-500 text-sm mb-6">If an account exists for that email, you will receive a reset link shortly.</p>
            <a href="login.html" class="text-[10px] font-black uppercase text-[#002147] tracking-widest underline">Return to Login</a>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { showToast } from './toast.js';

        const resetForm = document.getElementById('reset-form');
        const successView = document.getElementById('success-view');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            try {
                await sendPasswordResetEmail(auth, email);
                resetForm.classList.add('hidden');
                successView.classList.remove('hidden');
            } catch (error) {
                showToast(error.message, "error");
            }
        });
    </script>
</body>
</html>
