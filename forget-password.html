<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Access Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-[#002147] uppercase tracking-tighter">Access Recovery</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase mt-2">Transmit Reset Link to Registry</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
            <div id="status" class="hidden mb-6 p-4 rounded-xl text-[10px] font-bold uppercase"></div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Email Registry Address</label>
                    <input type="email" id="email" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 outline-none focus:border-[#002147]">
                </div>
                <button id="resetBtn" class="w-full h-14 bg-[#002147] text-white rounded-xl font-black uppercase tracking-widest shadow-lg">Reset Password</button>
            </div>
            <a href="login.html" class="block text-center mt-6 text-[10px] font-bold text-slate-400 uppercase"><i class="fas fa-arrow-left mr-2"></i> Return to Login</a>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        document.getElementById('resetBtn').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const stat = document.getElementById('status');
            if(!email) return;

            try {
                await sendPasswordResetEmail(auth, email);
                stat.innerText = "Protocol Success: Check inbox for reset instructions.";
                stat.className = "mb-6 p-4 rounded-xl text-[10px] font-bold uppercase bg-emerald-50 text-emerald-600 border border-emerald-100";
                stat.classList.remove('hidden');
            } catch (e) {
                stat.innerText = "Error: Node lookup failed for this email.";
                stat.className = "mb-6 p-4 rounded-xl text-[10px] font-bold uppercase bg-rose-50 text-rose-600 border border-rose-100";
                stat.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
