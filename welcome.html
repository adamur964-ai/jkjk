<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TB | Provisioning Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <div class="max-w-md w-full">
        <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 text-white text-3xl shadow-xl animate-bounce">
            <i class="fas fa-check"></i>
        </div>
        <h1 class="text-3xl font-black text-[#002147] uppercase tracking-tighter">Handshake Success</h1>
        <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mt-2">Account Provisioned Successfully</p>

        <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-xl mt-10 text-left space-y-6">
            <div class="flex justify-between border-b border-dashed pb-4">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Registry Number</span>
                <span id="ref" class="text-xs font-black text-[#002147] font-mono">...</span>
            </div>
            <div class="flex justify-between border-b border-dashed pb-4">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Status</span>
                <span class="text-xs font-black text-emerald-500 uppercase">Live / Ready</span>
            </div>
            <div class="bg-[#002147] p-4 rounded-xl text-white">
                <p class="text-[9px] font-bold uppercase opacity-60">Security Notice</p>
                <p class="text-xs font-bold mt-1">Identity verification is required for high-limit transfers and international withdrawals.</p>
            </div>
        </div>

        <button onclick="window.location.href='dashboard.html'" class="w-full h-14 bg-[#002147] text-white rounded-xl font-black uppercase tracking-widest shadow-lg mt-8">Enter Dashboard</button>
    </div>

    <script>
        document.getElementById('ref').innerText = 'TB-' + Math.floor(100000 + Math.random() * 900000);
    </script>
</body>
</html>
