<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Executive Terminal | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .admin-card { background: #1e293b; border: 1px solid #334155; }
        .tab-btn.active { border-bottom: 2px solid #D4AF37; color: #D4AF37; }
        ::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Top Nav -->
    <nav class="border-b border-slate-800 bg-slate-900 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#D4AF37] rounded-xl flex items-center justify-center text-[#002147] font-black shadow-lg">TB</div>
            <div>
                <h1 class="text-sm font-black uppercase tracking-widest text-white">Trust Bank</h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Executive Management Portal</p>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div id="admin-info" class="text-right">
                <p class="text-xs font-black text-white" id="admin-email-display">---</p>
                <p class="text-[9px] font-black text-[#D4AF37] uppercase">System Administrator</p>
            </div>
            <button id="logout-btn" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-rose-500 hover:bg-rose-500 hover:text-white transition-all">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>
    </nav>

    <!-- Tab Bar -->
    <div class="bg-slate-900 border-b border-slate-800 px-8 flex gap-8 overflow-x-auto no-scrollbar">
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors active" data-tab="users">Users</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="deposits">Deposits</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="withdrawals">Withdrawals</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="kyc">Identity</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="loans">Loans</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="support">Tickets</button>
        <button class="tab-btn py-4 text-[10px] font-black uppercase tracking-widest transition-colors" data-tab="audit">Audit Log</button>
    </div>

    <main class="p-8 max-w-7xl mx-auto">
        <div id="tab-content" class="space-y-6">
            <!-- Content Hydrates Here -->
            <div class="flex items-center justify-center py-20">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-[#D4AF37]"></i>
            </div>
        </div>
    </main>

    <!-- Global Modal for Rejection Reason -->
    <div id="rejection-modal" class="fixed inset-0 bg-slate-950/80 hidden z-[100] flex items-center justify-center p-6">
        <div class="admin-card w-full max-w-md p-8 rounded-3xl">
            <h3 class="text-xl font-black text-white mb-2">Decline Request</h3>
            <p class="text-slate-400 text-sm mb-6">Please provide a reason for the customer.</p>
            <textarea id="rejection-reason" class="w-full bg-slate-900 border-slate-700 text-white rounded-2xl p-4 h-32 mb-6" placeholder="Reason for declining..."></textarea>
            <div class="flex gap-4">
                <button id="cancel-modal" class="flex-1 py-4 font-black uppercase text-xs tracking-widest text-slate-400">Cancel</button>
                <button id="confirm-rejection" class="flex-1 bg-rose-600 text-white rounded-2xl py-4 font-black uppercase text-xs tracking-widest shadow-lg shadow-rose-900/20">Confirm Decline</button>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="image-modal" class="fixed inset-0 bg-black/95 hidden z-[110] flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="modal-img-tag" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAIL } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot, doc, updateDoc, increment, addDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { formatCurrency, formatDate } from './utils.js';
        import { showToast } from './toast.js';

        // 1. Guard Access
        auth.onAuthStateChanged(user => {
            if (!user || user.email !== ADMIN_EMAIL) {
                window.location.href = "login.html";
            }
            document.getElementById('admin-email-display').innerText = user.email;
        });

        document.getElementById('logout-btn').onclick = () => auth.signOut();

        // 2. State Management
        let currentTab = 'users';
        let pendingAction = null; // { id, collection, uid, amount, currency }

        const setTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            renderTab();
        };

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => setTab(btn.dataset.tab);
        });

        // 3. Admin Core Logic Helpers
        const logAction = async (action, targetUid, reason = "") => {
            await addDoc(collection(db, "auditLogs"), {
                actorUid: auth.currentUser.uid,
                action,
                targetUid,
                reason,
                timestamp: serverTimestamp()
            });
        };

        const notifyUser = async (uid, message, type = "INFO") => {
            await addDoc(collection(db, "notifications"), {
                uid, message, type, read: false, timestamp: serverTimestamp()
            });
        };

        window.viewImage = (base64) => {
            document.getElementById('modal-img-tag').src = base64;
            document.getElementById('image-modal').classList.remove('hidden');
        };

        // 4. Action Handlers
        window.approveDeposit = async (id, uid, amount) => {
            if (!confirm(`Approve deposit of ${formatCurrency(amount)}?`)) return;
            try {
                // Update Deposit status
                await updateDoc(doc(db, "deposits", id), { status: "SUCCESSFUL" });
                
                // Find and update Account
                const accQ = query(collection(db, "accounts"), where("ownerUid", "==", uid));
                const accSnap = await getDocs(accQ);
                const accDoc = accSnap.docs[0];
                const accData = accDoc.data();

                await updateDoc(doc(db, "accounts", accDoc.id), {
                    availableBalance: increment(amount),
                    totalBalance: increment(amount)
                });

                // Write Transaction Ledger
                await addDoc(collection(db, "transactions"), {
                    uid, type: "DEPOSIT", amount, currency: accData.currency,
                    status: "SUCCESSFUL", timestamp: serverTimestamp(),
                    description: "Deposit via Admin Approval"
                });

                await notifyUser(uid, `Your deposit of ${formatCurrency(amount)} was approved.`, "SUCCESS");
                await logAction("APPROVE_DEPOSIT", uid, `Amt: ${amount}`);
                showToast("Deposit Approved Successfully");
            } catch (err) { showToast(err.message, "error"); }
        };

        window.openDecline = (id, collectionName, uid) => {
            pendingAction = { id, collection: collectionName, uid };
            document.getElementById('rejection-modal').classList.remove('hidden');
        };

        document.getElementById('confirm-rejection').onclick = async () => {
            const reason = document.getElementById('rejection-reason').value;
            if (!reason) return showToast("Reason required", "error");
            
            const { id, collection, uid } = pendingAction;
            try {
                await updateDoc(doc(db, collection, id), { status: "DECLINED", declineReason: reason });
                await notifyUser(uid, `Your request was declined: ${reason}`, "ALERT");
                await logAction(`DECLINE_${collection.toUpperCase()}`, uid, reason);
                document.getElementById('rejection-modal').classList.add('hidden');
                document.getElementById('rejection-reason').value = '';
                showToast("Request Declined");
            } catch (err) { showToast(err.message, "error"); }
        };

        document.getElementById('cancel-modal').onclick = () => {
            document.getElementById('rejection-modal').classList.add('hidden');
        };

        window.verifyKYC = async (id, uid) => {
            await updateDoc(doc(db, "kyc", id), { status: "VERIFIED" });
            await updateDoc(doc(db, "users", uid), { kycStatus: "VERIFIED" });
            await notifyUser(uid, "Your identity has been verified.", "SUCCESS");
            await logAction("VERIFY_KYC", uid);
            showToast("KYC Verified");
        };

        // 5. Tab Rendering Logic
        const renderTab = () => {
            const content = document.getElementById('tab-content');
            content.innerHTML = `<div class="flex justify-center py-20"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-[#D4AF37]"></i></div>`;

            if (currentTab === 'users') {
                onSnapshot(collection(db, "users"), snap => {
                    content.innerHTML = `
                        <div class="grid gap-4">
                            ${snap.docs.map(doc => {
                                const u = doc.data();
                                return `
                                    <div class="admin-card p-6 rounded-3xl flex justify-between items-center">
                                        <div class="flex items-center gap-4">
                                            <img src="${u.profilePhoto || 'https://ui-avatars.com/api/?name='+u.fullName}" class="w-12 h-12 rounded-full border border-slate-700">
                                            <div>
                                                <p class="font-black text-white">${u.fullName}</p>
                                                <p class="text-[10px] font-bold text-slate-500 uppercase">${u.email} • ${u.status}</p>
                                            </div>
                                        </div>
                                        <div class="flex gap-2">
                                            <button class="px-4 py-2 bg-slate-800 rounded-xl text-[10px] font-black uppercase">Manage</button>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                });
            }

            if (currentTab === 'deposits') {
                onSnapshot(query(collection(db, "deposits"), orderBy("createdAt", "desc")), snap => {
                    content.innerHTML = `
                        <div class="grid gap-4">
                            ${snap.docs.map(dDoc => {
                                const d = dDoc.data();
                                const isPending = d.status === 'PENDING';
                                return `
                                    <div class="admin-card p-6 rounded-3xl flex justify-between items-center">
                                        <div>
                                            <p class="text-[10px] font-black text-[#D4AF37] uppercase tracking-widest">${d.method}</p>
                                            <p class="text-xl font-black text-white">${formatCurrency(d.amount)}</p>
                                            <p class="text-[10px] text-slate-500 mt-1">${formatDate(d.createdAt)}</p>
                                        </div>
                                        <div class="flex items-center gap-4">
                                            ${d.proofImage ? `<button onclick="viewImage('${d.proofImage}')" class="text-xs font-black text-blue-400 uppercase tracking-tighter">View Proof</button>` : ''}
                                            ${isPending ? `
                                                <button onclick="approveDeposit('${dDoc.id}', '${d.uid}', ${d.amount})" class="px-6 py-3 bg-emerald-600 rounded-2xl text-[10px] font-black uppercase">Approve</button>
                                                <button onclick="openDecline('${dDoc.id}', 'deposits', '${d.uid}')" class="px-6 py-3 bg-rose-600 rounded-2xl text-[10px] font-black uppercase">Decline</button>
                                            ` : `<span class="text-[10px] font-black uppercase text-slate-500">${d.status}</span>`}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                });
            }

            if (currentTab === 'kyc') {
                onSnapshot(query(collection(db, "kyc"), orderBy("submittedAt", "desc")), snap => {
                    content.innerHTML = `
                        <div class="grid md:grid-cols-2 gap-6">
                            ${snap.docs.map(kDoc => {
                                const k = kDoc.data();
                                return `
                                    <div class="admin-card p-6 rounded-[2rem]">
                                        <img src="${k.documentImage}" class="w-full h-48 object-cover rounded-2xl mb-4 cursor-pointer" onclick="viewImage('${k.documentImage}')">
                                        <div class="flex justify-between items-end">
                                            <div>
                                                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">${k.documentType}</p>
                                                <p class="font-bold text-white">${kDoc.id.slice(0,12)}...</p>
                                            </div>
                                            ${k.status === 'PENDING' ? `
                                                <div class="flex gap-2">
                                                    <button onclick="verifyKYC('${kDoc.id}', '${k.uid}')" class="px-4 py-2 bg-emerald-600 rounded-xl text-[9px] font-black uppercase">Verify</button>
                                                    <button onclick="openDecline('${kDoc.id}', 'kyc', '${k.uid}')" class="px-4 py-2 bg-rose-600 rounded-xl text-[9px] font-black uppercase">Reject</button>
                                                </div>
                                            ` : `<span class="text-[10px] font-black uppercase text-[#D4AF37]">${k.status}</span>`}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                });
            }

            if (currentTab === 'audit') {
                onSnapshot(query(collection(db, "auditLogs"), orderBy("timestamp", "desc")), snap => {
                    content.innerHTML = `
                        <div class="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden">
                            <table class="w-full text-left text-xs">
                                <thead class="bg-slate-800 text-slate-400 font-black uppercase tracking-widest">
                                    <tr>
                                        <th class="p-4">Action</th>
                                        <th class="p-4">Target UID</th>
                                        <th class="p-4">Reason/Detail</th>
                                        <th class="p-4">Timestamp</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-800">
                                    ${snap.docs.map(doc => {
                                        const l = doc.data();
                                        return `
                                            <tr class="hover:bg-slate-800/50">
                                                <td class="p-4 font-bold text-[#D4AF37]">${l.action}</td>
                                                <td class="p-4 text-slate-400">${l.targetUid.slice(0,8)}...</td>
                                                <td class="p-4 text-slate-300">${l.reason || '-'}</td>
                                                <td class="p-4 text-slate-500">${formatDate(l.timestamp)}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                });
            }
            
            // Add similar logic for withdrawals, support, etc. as needed for full build
        };

        // Init
        setTab('users');
    </script>
</body>
</html>
