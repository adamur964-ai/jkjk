<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards | Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 pb-32">
    <div id="header-container"></div>
    <main class="max-w-md mx-auto px-6 pt-8 space-y-8">
        <!-- Physical Card Visual -->
        <div id="cards-container" class="space-y-6">
            <!-- Skeleton Card -->
            <div class="animate-pulse bg-slate-200 h-52 rounded-[2rem] w-full"></div>
        </div>

        <button id="request-card-btn" class="w-full btn-primary h-16 shadow-xl shadow-navy-900/20">Request New Card</button>
    </main>

    <div id="nav-container"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { renderHeader, renderBottomNav, renderStatusBadge, renderEmptyState } from './components.js';
        import { showToast } from './toast.js';

        document.getElementById('header-container').innerHTML = renderHeader('My Cards', true);
        document.getElementById('nav-container').innerHTML = renderBottomNav('dashboard');

        auth.onAuthStateChanged(user => {
            if (user) {
                const q = query(collection(db, "cards"), where("uid", "==", user.uid));
                onSnapshot(q, snap => {
                    const cont = document.getElementById('cards-container');
                    if (snap.empty) { cont.innerHTML = renderEmptyState("You don't have any cards yet."); return; }
                    cont.innerHTML = snap.docs.map(doc => {
                        const c = doc.data();
                        return `
                            <div class="bg-gradient-to-br from-[#002147] to-[#001a3d] p-8 rounded-[2rem] text-white relative overflow-hidden shadow-2xl h-52 flex flex-col justify-between">
                                <div class="absolute top-0 right-0 w-40 h-40 bg-white/5 rounded-full -mr-10 -mt-10"></div>
                                <div class="flex justify-between items-start relative z-10">
                                    <span class="text-[10px] font-black uppercase tracking-widest text-[#D4AF37]">${c.cardType || 'Platinum Debit'}</span>
                                    <i class="fa-solid fa-signal text-xl opacity-50"></i>
                                </div>
                                <div class="relative z-10">
                                    <p class="text-2xl font-black tracking-[0.2em] mb-4">${c.maskedNumber || '•••• •••• •••• 0000'}</p>
                                    <div class="flex justify-between items-end">
                                        <div>
                                            <p class="text-[8px] uppercase font-black text-slate-400 mb-1">Card Holder</p>
                                            <p class="text-xs font-bold uppercase tracking-widest">${user.displayName || 'Trust Bank Member'}</p>
                                        </div>
                                        <div class="px-3 py-1 rounded-full bg-white/10 text-[9px] font-black uppercase border border-white/20">
                                            ${c.status}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                });
            }
        });

        document.getElementById('request-card-btn').onclick = async () => {
            try {
                await addDoc(collection(db, "cards"), {
                    uid: auth.currentUser.uid,
                    cardType: "Gold Platinum",
                    status: "PENDING",
                    createdAt: serverTimestamp()
                });
                showToast("Card request submitted!");
            } catch (err) {
                showToast(err.message, "error");
            }
        };
    </script>
</body>
</html>
